# =====================================================
# Agent Review Pipeline
# =====================================================

variables:
  STATION_OUT: "station_out"
  GIT_DEPTH: "0"
  # Set a clean config directory for gh to avoid cache conflicts
  GH_CONFIG_DIR: "${CI_PROJECT_DIR}/.gh_config"

stages:
  - setup
  - intake
  - validation
  - security
  - gate
  - update

default:
  image: node:20-bookworm-slim
  retry: 1

.station_base:
  before_script:
    - apt-get update -qq && apt-get install -y -qq git jq curl ca-certificates

    # 1. Install GitHub Copilot CLI via npm
    # See: https://docs.github.com/en/copilot/how-tos/copilot-cli/use-copilot-cli-agents/overview
    - npm install -g @github/copilot

    - |
      if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
        git fetch --unshallow
      fi
    - mkdir -p ${STATION_OUT}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# =====================================================
# A0 Intake: Analysis with Strict JSON formatting
# =====================================================

A0_intake:
  extends: .station_base
  stage: intake
  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - git diff --name-status origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME "$CI_COMMIT_SHA" > diff.txt
    - |
      # Use copilot CLI in autopilot mode (non-interactive, full permissions)
      copilot --autopilot --yolo -p "
      SYSTEM: You are a JSON-only API. 
      STRICT: Do not include markdown blocks (like \`\`\`json). Return raw text.
      GOAL: Analyze MR ${CI_MERGE_REQUEST_IID} ('${CI_MERGE_REQUEST_TITLE}').
      FILES: $(cat diff.txt)
      SCHEMA: {
        'mr_id': ${CI_MERGE_REQUEST_IID},
        'priority': 'P0'|'P1'|'P2',
        'risks': string[]
      }
      " > ${STATION_OUT}/raw.json
    # Extraction safety net
    - sed -n '/^{/,/}$/p' ${STATION_OUT}/raw.json > ${STATION_OUT}/work_order.json
    - jq . ${STATION_OUT}/work_order.json
  artifacts:
    paths: [ "${STATION_OUT}/work_order.json" ]

# =====================================================
# A5 Gate: The Final Decision
# =====================================================

A5_gate:
  extends: .station_base
  stage: gate
  needs: ["A0_intake"] # In a real flow, add your intermediate reports here
  script:
    - |
      copilot --autopilot --yolo -p "
      SYSTEM: You are a gatekeeper. Return raw JSON only.
      INPUT: $(cat ${STATION_OUT}/work_order.json)
      DECISION: Analyze input and decide if safe to proceed.
      SCHEMA: {
        'status': 'PASS' | 'BLOCK',
        'reason': 'string'
      }
      " > ${STATION_OUT}/gate_raw.json
    - sed -n '/^{/,/}$/p' ${STATION_OUT}/gate_raw.json > ${STATION_OUT}/gate_decision.json
    - |
      if [ "$(jq -r '.status' ${STATION_OUT}/gate_decision.json)" = "BLOCK" ]; then
        echo "Decision: BLOCKED"
        exit 1
      fi
  artifacts:
    paths: [ "${STATION_OUT}/gate_decision.json" ]

# =====================================================
# A6 Update: Post back to GitLab
# =====================================================

A6_update:
  stage: update
  needs: ["A5_gate"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq
  script:
    - |
      if [ ! -f "${STATION_OUT}/gate_decision.json" ]; then exit 0; fi
      STATUS=$(jq -r '.status' ${STATION_OUT}/gate_decision.json)
      REASON=$(jq -r '.reason' ${STATION_OUT}/gate_decision.json)
      PAYLOAD=$(jq -n --arg s "$STATUS" --arg r "$REASON" '{body: "### AI Gate: \($s)\n**Reason:** \($r)"}')
      curl --request POST --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
      --header "Content-Type: application/json" --data "$PAYLOAD" \
      "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"