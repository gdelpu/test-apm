# Run: merge request validation pipeline
# This pipeline executes PR-check validators and posts results as MR comments

stages:
  - validate
  - report

variables:
  # Configure: enable optional Copilot CLI advisory mode (set via CI/CD Variables in GitLab)
  ENABLE_COPILOT_CLI: "false"
  # Configure: paths to validator scripts
  VALIDATORS_DIR: "default/skills/ai-backbone-pr-checks/tools/scripts"
  REPORTS_DIR: "reports"
  # Configure: full git history for reliable diff against MR target branch
  GIT_DEPTH: "0"

# Template: base job configuration for merge requests
.mr_only:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Job: PR Auto Validator checks frontmatter, naming, links, and workflow hygiene
validate:pr-auto:
  extends: .mr_only
  stage: validate
  image: python:3.11
  before_script:
    - apt-get update && apt-get install -y git
    - python3 --version && python3 -m pip --version
    - python3 -m pip install --upgrade pip
    - python3 -m pip install PyYAML
    - python3 -c "import yaml; print('PyYAML OK')"
    - echo "Git branches available:" && git branch -a
    - echo "Fetching origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME..." && git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" 2>&1 || echo "Fetch returned non-zero status"
  script:
    - pwd
    - ls -la default/skills/ai-backbone-pr-checks/tools/scripts/ || echo "Scripts directory NOT FOUND"
    - mkdir -p $REPORTS_DIR
    - python3 $VALIDATORS_DIR/pr_auto_validator.py --base-ref origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME --head-ref $CI_COMMIT_SHA --out $REPORTS_DIR/pr-auto-validator.json
    - ls -la $REPORTS_DIR/
  artifacts:
    paths:
      - $REPORTS_DIR/pr-auto-validator.json
    expire_in: 14 days
    when: always
  allow_failure: true

# Job: YAML Workflow Linter validates workflow structure and safety
validate:yaml-workflows:
  extends: .mr_only
  stage: validate
  image: python:3.11
  before_script:
    - python3 --version && python3 -m pip --version
    - python3 -m pip install --upgrade pip
    - python3 -m pip install PyYAML
    - python3 -c "import yaml; print('PyYAML OK')"
  script:
    - pwd
    - ls -la default/skills/ai-backbone-pr-checks/tools/scripts/ || echo "Scripts directory NOT FOUND"
    - mkdir -p $REPORTS_DIR
    - python3 $VALIDATORS_DIR/yaml_workflow_linter.py --root . --out $REPORTS_DIR/yaml-workflow-linter.json
    - ls -la $REPORTS_DIR/
  artifacts:
    paths:
      - $REPORTS_DIR/yaml-workflow-linter.json
    expire_in: 14 days
    when: always
  allow_failure: true

# Job: Test Gap Detector advisory detects process documentation gaps
validate:test-gaps:
  extends: .mr_only
  stage: validate
  image: python:3.11
  before_script:
    - apt-get update && apt-get install -y git
    - python3 --version && python3 -m pip --version
    - python3 -m pip install --upgrade pip
    - python3 -m pip install PyYAML
    - python3 -c "import yaml; print('PyYAML OK')"
    - echo "Git branches available:" && git branch -a
    - echo "Fetching origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME..." && git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" 2>&1 || echo "Fetch returned non-zero status"
  script:
    - pwd
    - ls -la default/skills/ai-backbone-pr-checks/tools/scripts/ || echo "Scripts directory NOT FOUND"
    - mkdir -p $REPORTS_DIR
    - python3 $VALIDATORS_DIR/test_gap_detector.py --base-ref origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME --head-ref $CI_COMMIT_SHA --out $REPORTS_DIR/test-gap-detector.json
    - ls -la $REPORTS_DIR/
  artifacts:
    paths:
      - $REPORTS_DIR/test-gap-detector.json
    expire_in: 14 days
    when: always
  allow_failure: true

# Job: Copilot CLI Advisory (optional, requires GitHub Copilot CLI extension setup)
validate:copilot-advisory:
  extends: .mr_only
  stage: report
  image: python:3.11
  dependencies:
    - validate:pr-auto
    - validate:yaml-workflows
    - validate:test-gaps
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $ENABLE_COPILOT_CLI == "true"'
  script:
    - apt-get update && apt-get install -y curl jq
    - mkdir -p $REPORTS_DIR
    - |
      {
        echo "# Copilot Advisory Summary"
        echo ""
        echo "Copilot advisory pending execution."
      } > "$REPORTS_DIR/copilot-advisory.md"
    - |
      echo '{"reports": []}' > "$REPORTS_DIR/copilot-input.json"
    - |
      if [ -z "$COPILOT_CI_TOKEN" ]; then
        {
          echo "# Copilot Advisory Summary"
          echo ""
          echo "Copilot advisory skipped: missing COPILOT_CI_TOKEN CI/CD variable."
          echo "Set COPILOT_CI_TOKEN to enable GitHub CLI + Copilot CLI in runner."
        } > "$REPORTS_DIR/copilot-advisory.md"
        exit 0
      fi
    - |
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
        | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
      chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
        > /etc/apt/sources.list.d/github-cli.list
      apt-get update
      apt-get install -y gh
      gh --version
    - |
      python3 - <<'PY'
      import json
      from pathlib import Path

      report_paths = [
          Path("reports/pr-auto-validator.json"),
          Path("reports/yaml-workflow-linter.json"),
          Path("reports/test-gap-detector.json"),
      ]

      payload = {"reports": []}
      for p in report_paths:
          if p.exists():
              payload["reports"].append(json.loads(p.read_text(encoding="utf-8", errors="replace")))

      Path("reports/copilot-input.json").write_text(
          json.dumps(payload, indent=2), encoding="utf-8"
      )
      PY
    - |
      export GH_TOKEN="$COPILOT_CI_TOKEN"
      if ! gh api user >/tmp/gh-user.json 2>/tmp/gh-user.err; then
        {
          echo "# Copilot Advisory Summary"
          echo ""
          echo "GitHub authentication failed in runner."
          echo ""
          echo "## CLI Error"
          cat /tmp/gh-user.err
        } > "$REPORTS_DIR/copilot-advisory.md"
        exit 0
      fi
    - |
      if ! gh extension install github/gh-copilot --force >/tmp/gh-ext.log 2>/tmp/gh-ext.err; then
        {
          echo "# Copilot Advisory Summary"
          echo ""
          echo "Failed to install gh-copilot extension in runner."
          echo ""
          echo "## CLI Error"
          cat /tmp/gh-ext.err
        } > "$REPORTS_DIR/copilot-advisory.md"
        exit 0
      fi
    - |
      if ! gh copilot --help >/tmp/gh-copilot-help.log 2>/tmp/gh-copilot-help.err; then
        {
          echo "# Copilot Advisory Summary"
          echo ""
          echo "gh-copilot extension is installed but not executable."
          echo ""
          echo "## CLI Error"
          cat /tmp/gh-copilot-help.err
        } > "$REPORTS_DIR/copilot-advisory.md"
        exit 0
      fi
    - |
      PROMPT="Read reports/copilot-input.json and produce concise advisory bullets: top risks, quick fixes, and confidence level."
      if gh copilot suggest -t shell "$PROMPT" > "$REPORTS_DIR/copilot-advisory.md" 2>/tmp/copilot.err; then
        true
      else
        {
          echo "# Copilot Advisory Summary"
          echo ""
          echo "Copilot advisory execution failed."
          echo ""
          echo "## CLI Error"
          cat /tmp/copilot.err
        } > "$REPORTS_DIR/copilot-advisory.md"
      fi
  artifacts:
    paths:
      - $REPORTS_DIR/copilot-advisory.md
      - $REPORTS_DIR/copilot-input.json
    expire_in: 14 days
    when: always
  allow_failure: true

# Job: Aggregate reports and post merge request comment
report:summary:
  extends: .mr_only
  stage: report
  image: python:3.11
  dependencies:
    - validate:pr-auto
    - validate:yaml-workflows
    - validate:test-gaps
  script:
    - apt-get update && apt-get install -y curl jq
    - |
      curl --silent \
      --header "PRIVATE-TOKEN: $GITLAB_PAT" \
      "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes?per_page=100" \
      > mr-notes.json || echo "[]" > mr-notes.json
    - |
      cat > /tmp/gen_comment.py <<'SCRIPT'
      import json
      import re
      from pathlib import Path

      notes_path = Path("mr-notes.json")
      notes = []
      if notes_path.exists():
        try:
          parsed = json.loads(notes_path.read_text(encoding="utf-8", errors="replace"))
          if isinstance(parsed, list):
            notes = parsed
        except Exception:
          notes = []

      previous_attempt = 0
      pattern = re.compile(r"\[AI-FIX-ATTEMPT:(\d+)\]")
      for note in notes:
        body = str(note.get("body", ""))
        for match in pattern.findall(body):
          previous_attempt = max(previous_attempt, int(match))

      reports = [
          ("PR Auto Validator", Path("reports/pr-auto-validator.json")),
          ("YAML Workflow Linter", Path("reports/yaml-workflow-linter.json")),
          ("Test Gap Detector", Path("reports/test-gap-detector.json")),
      ]
      lines = ["## MR Validation Summary", ""]
      all_fix_suggestions = []
      has_blocking = False
      for title, path in reports:
          lines.append(f"### {title}")
          if path.exists():
              data = json.loads(path.read_text(encoding="utf-8", errors="replace"))
              lines.append(f"**Status:** {str(data.get('status', 'unknown')).upper()}")
              lines.append("")
              lines.append("Summary:")
              for item in data.get("summary", []):
                  lines.append(f"- {item}")
          blocking_issues = data.get("blocking_issues", [])
          if isinstance(blocking_issues, list) and blocking_issues:
            has_blocking = True
          suggestions = data.get("fix_suggestions", [])
          if isinstance(suggestions, list):
            all_fix_suggestions.extend(suggestions)
          else:
              lines.append("Report not generated")
          lines.append("")

      current_attempt = previous_attempt + 1 if has_blocking else previous_attempt
      if current_attempt > 3:
        current_attempt = 3

      if has_blocking:
        lines.append(f"[AI-FIX-ATTEMPT:{current_attempt}]")
        lines.append("")

      if all_fix_suggestions:
        lines.append("### Structured Fix Suggestions")
        for idx, suggestion in enumerate(all_fix_suggestions[:12], start=1):
          file_name = suggestion.get("file", "unknown")
          issue = suggestion.get("issue", "unspecified")
          proposed_fix = suggestion.get("proposed_fix", "No fix proposed")
          lines.append(f"{idx}. **{issue}** ({file_name})")
          lines.append(f"   - Proposed fix: {proposed_fix}")
        lines.append("")

      human_review_required = has_blocking and current_attempt >= 3
      if human_review_required:
        lines.append("### Human Review Gate")
        lines.append("AI reached iteration 3 - human review required.")
        lines.append("")

      advisory = Path("reports/copilot-advisory.md")
      if advisory.exists():
          lines.append("### Copilot Advisory")
          lines.append(advisory.read_text(encoding="utf-8", errors="replace"))
      Path("comment.md").write_text("\n".join(lines).strip() + "\n", encoding="utf-8")
      Path("attempt-state.json").write_text(
        json.dumps(
          {
            "previous_attempt": previous_attempt,
            "current_attempt": current_attempt,
            "has_blocking": has_blocking,
            "human_review_required": human_review_required,
          },
          indent=2,
        ),
        encoding="utf-8",
      )
      SCRIPT
    - python3 /tmp/gen_comment.py
    - |
      if [ -z "$GITLAB_PAT" ]; then
        echo "GITLAB_PAT not set - skipping MR comment post"
      else
        curl --request POST \
          --header "PRIVATE-TOKEN: $GITLAB_PAT" \
          --header "Content-Type: application/json" \
          --data "{\"body\": $(jq -Rs . < comment.md)}" \
          "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" || true
      fi
    - |
      if [ -f attempt-state.json ] && [ "$(jq -r '.human_review_required' attempt-state.json)" = "true" ]; then
        echo "AI reached iteration 3 - human review required"
        exit 1
      fi
  artifacts:
    paths:
      - comment.md
      - attempt-state.json
      - $REPORTS_DIR/
    expire_in: 14 days
    when: always
