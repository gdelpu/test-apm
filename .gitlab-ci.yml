# =====================================================
# Agent Review Pipeline (new token)
# =====================================================

variables:
  STATION_OUT: "station_out"
  GIT_DEPTH: "0"
  # Set a clean config directory for gh to avoid cache conflicts
  GH_CONFIG_DIR: "${CI_PROJECT_DIR}/.gh_config"

stages:
  - setup
  - intake
  - validation
  - security
  - gate
  - update

default:
  image: node:20-bookworm-slim
  retry: 1

.station_base:
  before_script:
    - apt-get update -qq && apt-get install -y -qq git jq curl ca-certificates python3

    # 1. Install GitHub Copilot CLI via npm
    # See: https://docs.github.com/en/copilot/how-tos/copilot-cli/use-copilot-cli-agents/overview
    - npm install -g @github/copilot

    # 2. Reference versioned JSON extractor from repo (avoids inline maintenance surface;
    #    detects and warns on multi-object model responses instead of silently truncating)
    - EXTRACT_JSON="${CI_PROJECT_DIR}/station-workflows/scripts/extract_json.py"
    - |
      if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
        git fetch --unshallow
      fi
    - mkdir -p ${STATION_OUT}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# =====================================================
# A0 Intake: Analysis with Strict JSON formatting
# =====================================================

A0_intake:
  extends: .station_base
  stage: intake
  resource_group: copilot-api-${CI_PROJECT_ID}
  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - git diff --name-status origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME "$CI_COMMIT_SHA" > diff_raw.txt
    # Filter fixture files so adversarial test payloads never reach the model
    - grep -v 'station-workflows/fixtures/' diff_raw.txt > diff.txt || cp diff_raw.txt diff.txt
    # Sanitize MR title: NFKC-normalize unicode (defeats encoding tricks), strip controls, cap at 200 chars
    - SAFE_TITLE=$(printf '%s' "${CI_MERGE_REQUEST_TITLE}" | python3 "${CI_PROJECT_DIR}/station-workflows/scripts/sanitize_title.py")
    # Block injection patterns -- Python regex handles whitespace/case variants missed by grep
    - |
      if python3 "${CI_PROJECT_DIR}/station-workflows/scripts/check_injection.py" "$SAFE_TITLE"; then
        echo "ERROR: MR title matches a prompt-injection pattern." >&2
        exit 1
      fi
    - |
      # --yolo removed: prevents the agent from executing arbitrary tools inside CI
      copilot --autopilot -p "
      SYSTEM: You are a JSON-only API.
      STRICT: Do not include markdown blocks (like \`\`\`json). Return raw text.
      GOAL: Analyze MR ${CI_MERGE_REQUEST_IID} ('${SAFE_TITLE}').
      FILES: $(cat diff.txt)
      SCHEMA: {
        'mr_id': ${CI_MERGE_REQUEST_IID},
        'priority': 'P0'|'P1'|'P2',
        'risks': string[]
      }
      " > ${STATION_OUT}/raw.json
    - |
      if ! python3 "$EXTRACT_JSON" < "${STATION_OUT}/raw.json" > "${STATION_OUT}/work_order.json"; then
        echo "ERROR: Model did not return parseable JSON." >&2
        exit 1
      fi
    - jq . ${STATION_OUT}/work_order.json
  artifacts:
    paths: [ "${STATION_OUT}/work_order.json" ]
    exclude: [ ".gh_config/**" ]

# =====================================================
# A1-A4: Policy, Security, Injection, Sandbox stubs
# Replace each echo/stub with a real copilot --autopilot
# call wired to the matching station prompt file.
# =====================================================

A1_policy_validation:
  extends: .station_base
  stage: validation
  needs: ["A0_intake"]
  script:
    - echo "STUB - A1 Policy Validation - implement with station-workflows/stations/A1-policy-validation.prompt.md"
    - echo '{"status":"STUB","station":"A1"}' > "${STATION_OUT}/a1_policy.json"
  artifacts:
    paths: [ "${STATION_OUT}/a1_policy.json" ]
    exclude: [ ".gh_config/**" ]

A2_security_static:
  extends: .station_base
  stage: security
  needs: ["A1_policy_validation"]
  script:
    - echo "STUB - A2 Security Static Analysis - implement with station-workflows/stations/A2-security-static.prompt.md"
    - echo '{"status":"STUB","station":"A2"}' > "${STATION_OUT}/a2_security.json"
  artifacts:
    paths: [ "${STATION_OUT}/a2_security.json" ]
    exclude: [ ".gh_config/**" ]

A3_prompt_injection:
  extends: .station_base
  stage: security
  needs: ["A1_policy_validation"]
  script:
    - echo "STUB - A3 Prompt Injection Check - implement with station-workflows/stations/A3-prompt-injection.prompt.md"
    - echo '{"status":"STUB","station":"A3"}' > "${STATION_OUT}/a3_injection.json"
  artifacts:
    paths: [ "${STATION_OUT}/a3_injection.json" ]
    exclude: [ ".gh_config/**" ]

A4_sandbox_simulation:
  extends: .station_base
  stage: security
  needs: ["A2_security_static", "A3_prompt_injection"]
  script:
    - echo "STUB - A4 Sandbox Simulation - implement with station-workflows/stations/A4-sandbox-simulation.prompt.md"
    - echo '{"status":"STUB","station":"A4"}' > "${STATION_OUT}/a4_sandbox.json"
  artifacts:
    paths: [ "${STATION_OUT}/a4_sandbox.json" ]
    exclude: [ ".gh_config/**" ]

# =====================================================
# A5 Gate: The Final Decision
# =====================================================

A5_gate:
  extends: .station_base
  stage: gate
  resource_group: copilot-api-${CI_PROJECT_ID}
  needs: ["A0_intake", "A1_policy_validation", "A2_security_static", "A3_prompt_injection", "A4_sandbox_simulation"]
  script:
    - |
      # --yolo removed: prevents the agent from executing arbitrary tools inside CI
      copilot --autopilot -p "
      SYSTEM: You are a gatekeeper. Return raw JSON only.
      INPUT: $(cat ${STATION_OUT}/work_order.json)
      DECISION: Analyze input and decide if safe to proceed.
      SCHEMA: {
        'status': 'PASS' | 'BLOCK',
        'reason': 'string'
      }
      " > ${STATION_OUT}/gate_raw.json
    # Fail-closed JSON extraction: any parse failure blocks the gate
    - |
      if ! python3 "$EXTRACT_JSON" < "${STATION_OUT}/gate_raw.json" > "${STATION_OUT}/gate_decision.json"; then
        echo "ERROR: Failed to extract gate decision JSON. Failing safe." >&2
        exit 1
      fi
    # Fail-closed: only an explicit 'PASS' allows the pipeline to proceed
    - |
      GATE_STATUS=$(jq -r '.status // "UNKNOWN"' "${STATION_OUT}/gate_decision.json" 2>/dev/null || echo "UNKNOWN")
      if [ "$GATE_STATUS" != "PASS" ]; then
        echo "Decision: BLOCKED (status=${GATE_STATUS})" >&2
        exit 1
      fi
      echo "Decision: PASS"
    # Sign the decision artifact so A6 can detect accidental corruption or misconfiguration
    - sha256sum "${STATION_OUT}/gate_decision.json" > "${STATION_OUT}/gate_decision.json.sha256"
  artifacts:
    paths:
      - "${STATION_OUT}/gate_decision.json"
      - "${STATION_OUT}/gate_decision.json.sha256"
    exclude: [ ".gh_config/**" ]

# =====================================================
# A6 Update: Post back to GitLab
# =====================================================

A6_update:
  stage: update
  needs: ["A5_gate"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq python3
  script:
    - |
      if [ -z "${GITLAB_TOKEN}" ]; then
        echo "GITLAB_TOKEN is not set; skipping MR note." >&2
        exit 0
      fi
      if [ ! -f "${STATION_OUT}/gate_decision.json" ]; then
        echo "No gate decision file found; skipping MR note." >&2
        exit 0
      fi
      # Verify artifact integrity before reading (detects accidental corruption / pipeline misconfiguration)
      if [ -f "${STATION_OUT}/gate_decision.json.sha256" ]; then
        if ! sha256sum -c "${STATION_OUT}/gate_decision.json.sha256" --status; then
          echo "ERROR: gate_decision.json SHA256 mismatch; refusing to post." >&2
          exit 1
        fi
      else
        echo "WARNING: No SHA256 checksum found for gate_decision.json; skipping integrity check." >&2
      fi
      STATUS=$(jq -r '.status' "${STATION_OUT}/gate_decision.json")
      # Cap reason at 500 chars and HTML-escape to prevent note injection via model output
      REASON_SAFE=$(jq -r '.reason' "${STATION_OUT}/gate_decision.json" | \
        python3 -c "import sys, html; print(html.escape(sys.stdin.read()[:500]), end='')")
      PAYLOAD=$(jq -n --arg s "$STATUS" --arg r "$REASON_SAFE" '{"body": "### AI Gate: \($s)\n**Reason:** \($r)"}')
      curl --fail --silent --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$PAYLOAD" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"