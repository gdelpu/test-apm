# =====================================================
# Merge Request Validation Pipeline
# =====================================================
#
# Two-phase design:
#   1. validate  — deterministic Python checks run in parallel
#   2. stations  — AI station orchestrator runs sequentially,
#                  only after blocking validators pass
# =====================================================

stages:
  - validate
  - stations
  - build
  - test
  - publish

# -----------------------------------------------------
# Global Variables
# -----------------------------------------------------
variables:
  ENABLE_COPILOT_CLI: "false"

  VALIDATORS_DIR: ".apm/skills/ai-backbone-pr-checks/tools/scripts"
  REPORTS_DIR: "outputs/reports"

  STATION_OUT: "outputs/station_out"
  STATION_DIR: "ci-gates/stations"
  STATION_TIMEOUT: "900"

  GIT_DEPTH: "0"

  GH_CONFIG_DIR: "${CI_PROJECT_DIR}/.gh_config"
  COPILOT_MAX_DIFF_LINES: "2000"
  COPILOT_CLI_VERSION: "1.0.4"

  # APM distribution
  APM_PACKAGE_NAME: "ssg-ai-backbone"
  APM_DIST_DIR: "dist"

default:
  image: node:20-bookworm-slim
  retry: 1

# -----------------------------------------------------
# Templates
# -----------------------------------------------------

.mr_only:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

.branch_and_tag:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    - if: '$CI_COMMIT_BRANCH'

.main_only:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# =====================================================
# PR Validators
# =====================================================

validate:pr-auto:
  extends: .mr_only
  stage: validate
  image: python:3.11

  before_script:
    - apt-get update && apt-get install -y git
    - python3 -m pip install --upgrade pip PyYAML
    - git fetch origin "+refs/heads/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME:refs/remotes/origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - mkdir -p $REPORTS_DIR

  script:
    - |
      python3 $VALIDATORS_DIR/pr_auto_validator.py \
        --base-ref origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME \
        --head-ref $CI_COMMIT_SHA \
        --out $REPORTS_DIR/pr-auto-validator.json || {
          echo '{"status":"error","summary":["pr_auto_validator.py crashed"],"blocking_issues":["Script failed before producing report"],"warnings":[]}' \
            > $REPORTS_DIR/pr-auto-validator.json
          exit 1
        }

  artifacts:
    paths:
      - $REPORTS_DIR/pr-auto-validator.json
    expire_in: 14 days
    when: always


validate:yaml-workflows:
  extends: .mr_only
  stage: validate
  image: python:3.11

  before_script:
    - python3 -m pip install --upgrade pip PyYAML
    - mkdir -p $REPORTS_DIR

  script:
    - |
      python3 $VALIDATORS_DIR/yaml_workflow_linter.py \
        --root . \
        --out $REPORTS_DIR/yaml-workflow-linter.json || {
          echo '{"status":"error","summary":["yaml_workflow_linter.py crashed"],"blocking_issues":["Script failed before producing report"],"warnings":[]}' \
            > $REPORTS_DIR/yaml-workflow-linter.json
          exit 1
        }

  artifacts:
    paths:
      - $REPORTS_DIR/yaml-workflow-linter.json
    expire_in: 14 days
    when: always


validate:test-gaps:
  extends: .mr_only
  stage: validate
  image: python:3.11

  before_script:
    - apt-get update && apt-get install -y git
    - python3 -m pip install --upgrade pip PyYAML
    - git fetch origin "+refs/heads/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME:refs/remotes/origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - mkdir -p $REPORTS_DIR

  script:
    - |
      python3 $VALIDATORS_DIR/test_gap_detector.py \
        --base-ref origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME \
        --head-ref $CI_COMMIT_SHA \
        --out $REPORTS_DIR/test-gap-detector.json || {
          echo '{"status":"error","summary":["test_gap_detector.py crashed"],"blocking_issues":["Script failed before producing report"],"warnings":[]}' \
            > $REPORTS_DIR/test-gap-detector.json
          exit 1
        }

  artifacts:
    paths:
      - $REPORTS_DIR/test-gap-detector.json
    expire_in: 14 days
    when: always

  allow_failure: true


validate:changelog:
  extends: .mr_only
  stage: validate
  image: python:3.11-slim

  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - git config user.email "ci@${CI_SERVER_HOST}"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch origin "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}" "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"

  script:
    - |
      VERSION=$(python3 -c "
      import re
      with open('apm.yml') as f:
          for line in f:
              m = re.match(r'^version:\s*(.+)', line)
              if m:
                  print(m.group(1).strip())
                  break
      ")
      if [ -z "$VERSION" ]; then
        echo "❌ Could not read version from apm.yml"
        exit 1
      fi
      export VERSION

      # Check if apm.yml version was changed in this MR
      TARGET_VERSION=$(git show "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}:apm.yml" 2>/dev/null \
        | python3 -c "
      import re, sys
      for line in sys.stdin:
          m = re.match(r'^version:\s*(.+)', line)
          if m:
              print(m.group(1).strip())
              break
      " || echo "")

      if [ "$VERSION" != "$TARGET_VERSION" ]; then
        echo "🔖 Version bumped: ${TARGET_VERSION} → ${VERSION} (release mode)"
        MODE="release"
      else
        echo "📝 Version unchanged: ${VERSION} (unreleased mode)"
        MODE="unreleased"
      fi
    - |
      if [ "$MODE" = "release" ]; then
        # Release mode: ensure versioned entry exists and is not a stub
        NEEDS_FIX=0
        if ! grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
          echo "⚠️  No changelog entry for ${VERSION} — auto-generating from commits..."
          NEEDS_FIX=1
        else
          python3 -c "
      import re, sys, os
      version = os.environ['VERSION']
      with open('CHANGELOG.md') as f:
          text = f.read()
      pattern = r'## \[' + re.escape(version) + r'\][^\n]*\n(.*?)(?=\n## \[|\Z)'
      m = re.search(pattern, text, re.DOTALL)
      if not m: sys.exit(1)
      body = m.group(1).strip()
      if not re.search(r'^###\s', body, re.MULTILINE): sys.exit(1)
      " || {
            echo "⚠️  Changelog entry for ${VERSION} is a stub — regenerating..."
            NEEDS_FIX=1
          }
        fi
        if [ "$NEEDS_FIX" = "1" ]; then
          git checkout "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
          python3 scripts/generate-changelog-entry.py --mode release \
            --base-ref "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}" --apply --push
          echo "✅ Auto-generated release entry for ${VERSION} and pushed"
          echo "ℹ️  Review the generated entry and amend if needed."
        else
          echo "✅ CHANGELOG.md release entry for ${VERSION} is valid"
        fi
      else
        # Unreleased mode: merge MR commits into [Unreleased]
        git checkout "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
        python3 scripts/generate-changelog-entry.py --mode unreleased \
          --base-ref "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}" --apply --push \
          && echo "✅ Updated [Unreleased] section with MR changes" \
          || echo "ℹ️  No new unreleased items to add"
      fi

# =====================================================
# AI Station Orchestrator
# =====================================================
# Dynamically discovers all .prompt.md / .agent.md files
# in ci-gates/stations/, sorts by prefix (a0…a7),
# and runs them sequentially via Copilot CLI.
#
# Runs ONLY after the two blocking deterministic validators
# pass (test-gaps is advisory and does not gate).
# =====================================================

stations:run-all:
  extends: .mr_only
  stage: stations
  image: node:20-bookworm-slim

  needs:
    - job: validate:pr-auto
      artifacts: true
    - job: validate:yaml-workflows
      artifacts: true

  before_script:
    - apt-get update -qq && apt-get install -y -qq git jq curl ca-certificates python3 findutils
    - npm install -g "@github/copilot@${COPILOT_CLI_VERSION}"
    - |
      if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
        git fetch --unshallow
      fi
    - mkdir -p ${STATION_OUT}

  script:
    - bash "${CI_PROJECT_DIR}/ci-gates/scripts/run_stations.sh"

  artifacts:
    paths:
      - ${STATION_OUT}/
      - ${REPORTS_DIR}/
    expire_in: 14 days
    when: always

# =====================================================
# APM Bundle Build
# =====================================================
# Builds distribution archives for all APM targets.
# Runs on branch pushes and tag pushes.
# Archives are stored as job artifacts.
# =====================================================

build:apm-bundles:
  extends: .branch_and_tag
  stage: build
  image: node:20-bookworm-slim

  before_script:
    - apt-get update -qq && apt-get install -y -qq coreutils
    - chmod +x scripts/apm-build.sh scripts/project-copilot.sh

  script:
    # Always re-project before packing so .github/ is never stale in the bundle
    - bash scripts/project-copilot.sh --provider github-copilot --full --clean
    - bash scripts/apm-build.sh --output-dir "${APM_DIST_DIR}"

  artifacts:
    paths:
      - ${APM_DIST_DIR}/
    expire_in: 14 days

  cache:
    key: "apm-bundles-${CI_COMMIT_REF_SLUG}"
    paths:
      - ${APM_DIST_DIR}/

# =====================================================
# APM Bundle Smoke Test
# =====================================================
# Validates that built archives contain expected files.
# Runs after build, gates publish.
# =====================================================

test:apm-smoke:
  extends: .branch_and_tag
  stage: test
  image: node:20-bookworm-slim

  needs:
    - job: build:apm-bundles
      artifacts: true

  script:
    - |
      set -euo pipefail
      echo "── Smoke-testing APM bundles ──"
      FAIL=0
      for archive in ${APM_DIST_DIR}/*.tar.gz; do
        [ -f "$archive" ] || continue
        name=$(basename "$archive")
        echo "Checking: $name"
        file_count=$(tar -tzf "$archive" | wc -l)
        if [ "$file_count" -lt 1 ]; then
          echo "❌ $name is empty"
          FAIL=1
        else
          echo "✅ $name — $file_count entries"
        fi
        # Verify agent count in copilot bundle
        if echo "$name" | grep -q "copilot"; then
          agent_count=$(tar -tzf "$archive" | grep -E '\.github/agents/.*\.md$' | wc -l)
          provider_agent_count=$(tar -tzf "$archive" | grep -E 'providers/github-copilot/agents/.*\.agent\.md$' | wc -l)
          prompt_count=$(tar -tzf "$archive" | grep -E '\.github/prompts/.*\.md$' | wc -l)
          echo "  Agents projected:       $agent_count"
          echo "  Provider agent files:   $provider_agent_count"
          echo "  Prompts projected:      $prompt_count"
          if [ "$agent_count" -lt 20 ]; then
            echo "❌ Expected at least 20 projected agents, got $agent_count"
            FAIL=1
          fi
          if [ "$provider_agent_count" -lt 20 ]; then
            echo "❌ Expected at least 20 provider agent files, got $provider_agent_count"
            FAIL=1
          fi
          if [ "$prompt_count" -lt 10 ]; then
            echo "❌ Expected at least 10 projected prompts, got $prompt_count"
            FAIL=1
          fi
          # Verify hooks are bundled
          hook_count=$(tar -tzf "$archive" | grep -c '\.apm/hooks/' || true)
          echo "  Hook files:             $hook_count"
          if [ "$hook_count" -lt 20 ]; then
            echo "❌ Expected at least 20 hook files, got $hook_count"
            FAIL=1
          fi
          # Verify templates are bundled (hook-config.json seeding)
          template_count=$(tar -tzf "$archive" | grep -c '\.apm/templates/' || true)
          echo "  Template files:         $template_count"
          if [ "$template_count" -lt 1 ]; then
            echo "❌ Expected at least 1 template file, got $template_count"
            FAIL=1
          fi
        fi
      done
      if [ -f "${APM_DIST_DIR}/SHA256SUMS" ]; then
        echo "✅ SHA256SUMS present"
      else
        echo "⚠️  SHA256SUMS missing (non-blocking)"
      fi
      if [ "$FAIL" -ne 0 ]; then
        echo "❌ Smoke test failed"
        exit 1
      fi
      echo "✅ All archives verified"

# =====================================================
# Auto-Release: Tag + Publish
# =====================================================
# Runs on pushes to main (i.e. after MR merge).
# Reads version from apm.yml, creates git tag if needed,
# then publishes bundles to the GitLab Generic Package
# Registry — all in one job.
#
# Note: CI_JOB_TOKEN-created tags don't trigger new
# pipelines, so tagging and publishing are combined.
# =====================================================

release:tag-and-publish:
  extends: .main_only
  stage: publish
  image: python:3.11-slim

  needs:
    - job: build:apm-bundles
      artifacts: true
    - job: test:apm-smoke
      artifacts: false

  dependencies:
    - build:apm-bundles

  script:
    - apt-get update -qq && apt-get install -y -qq git curl
    - git config user.email "ci@${CI_SERVER_HOST}"
    - git config user.name "GitLab CI"
    - chmod +x scripts/apm-publish.sh
    - |
      VERSION=$(python3 -c "
      import re
      with open('apm.yml') as f:
          for line in f:
              m = re.match(r'^version:\s*(.+)', line)
              if m:
                  print(m.group(1).strip())
                  break
      ")
      if [ -z "$VERSION" ]; then
        echo "❌ Could not read version from apm.yml"
        exit 1
      fi
      TAG="v${VERSION}"
      echo "Version from apm.yml: ${VERSION}  →  Tag: ${TAG}"
    - |
      # Enforce CHANGELOG.md has an entry for this version
      if ! grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
        echo "❌ CHANGELOG.md has no entry for version ${VERSION}"
        echo "   Add a '## [${VERSION}] — YYYY-MM-DD' section before merging."
        exit 1
      fi
      echo "✅ CHANGELOG.md contains entry for ${VERSION}"
    - |
      git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      REMOTE_TAGS=$(git ls-remote --tags origin "refs/tags/${TAG}" 2>/dev/null)
      if [ -n "$REMOTE_TAGS" ]; then
        echo "ℹ️  Tag ${TAG} already exists — skipping tag creation"
      else
        echo "Creating tag ${TAG} at ${CI_COMMIT_SHA}..."
        git tag -a "${TAG}" -m "Release ${TAG}" "${CI_COMMIT_SHA}"
        git push origin "${TAG}"
        echo "✅ Tag ${TAG} created"
      fi
    - |
      if [ ! -d "${APM_DIST_DIR}" ]; then
        echo "⚠️  Artifacts not found — listing workspace for diagnostics:"
        ls -la
        echo "❌ Distribution directory not found: ${APM_DIST_DIR}"
        exit 1
      fi
      echo "Publishing ${TAG} to registry..."
      bash scripts/apm-publish.sh --version "${TAG}" --dist-dir "${APM_DIST_DIR}"

