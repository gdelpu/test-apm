# ------------------------------------------------
# Agent Factory CI Pipeline
# ------------------------------------------------

variables:
  STATION_OUT: "station_out"
  GIT_DEPTH: "0"

stages:
  - setup
  - intake
  - validation
  - security
  - simulation
  - gate
  - update

default:
  image: node:20-bookworm-slim
  retry: 1

cache:
  paths:
    - /opt/ci-tools/node_modules

# ------------------------------------------------
# Base Station Template
# ------------------------------------------------

.station_base:

  before_script:

    - apt-get update -qq
    - apt-get install -y -qq git jq curl ca-certificates

    # Ensure full git history
    - |
      if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
        git fetch --unshallow
      fi

    # Dedicated tool directory
    - export TOOL_DIR=/opt/ci-tools
    - mkdir -p $TOOL_DIR

    # Install Copilot CLI deterministically
    - npm install --prefix $TOOL_DIR @githubnext/github-copilot-cli

    # Create stable copilot command
    - |
      cat << 'EOF' > /usr/local/bin/copilot
      #!/usr/bin/env bash
      node /opt/ci-tools/node_modules/@githubnext/github-copilot-cli/dist/index.js "$@"
      EOF

    - chmod +x /usr/local/bin/copilot

    # verify installation
    - copilot --version || true

    - mkdir -p ${STATION_OUT}

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success

# ------------------------------------------------
# Setup
# ------------------------------------------------

setup:

  stage: setup

  script:
    - mkdir -p ${STATION_OUT}
    - echo "Setup complete"

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success

  artifacts:
    paths:
      - ${STATION_OUT}

# ------------------------------------------------
# A0 Intake
# ------------------------------------------------

A0_intake:

  extends: .station_base
  stage: intake

  needs:
    - job: setup
      optional: true

  script:

    - |
      if [ -n "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" ]; then
        git diff --name-status "$CI_MERGE_REQUEST_DIFF_BASE_SHA" "$CI_COMMIT_SHA" > diff.txt
      else
        git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        git diff --name-status origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME "$CI_COMMIT_SHA" > diff.txt
      fi

    - |
      copilot chat -p "
      Produce ONLY JSON.

      Create work_order.json.

      MR: ${CI_MERGE_REQUEST_IID}
      TITLE: ${CI_MERGE_REQUEST_TITLE}

      FILES:
      $(cat diff.txt)
      " > ${STATION_OUT}/work_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/work_raw.json > ${STATION_OUT}/work_order.json

    - jq . ${STATION_OUT}/work_order.json

  artifacts:
    paths:
      - ${STATION_OUT}/work_order.json

# ------------------------------------------------
# A1 Policy Validation
# ------------------------------------------------

A1_policy:

  extends: .station_base
  stage: validation

  needs:
    - A0_intake

  script:

    - |
      copilot chat -p "
      Validate agent manifests.

      Input:
      $(cat ${STATION_OUT}/work_order.json)

      Output policy_report.json
      " > ${STATION_OUT}/policy_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/policy_raw.json > ${STATION_OUT}/policy_report.json

    - jq . ${STATION_OUT}/policy_report.json

  artifacts:
    paths:
      - ${STATION_OUT}/policy_report.json

# ------------------------------------------------
# A2 Security Scan
# ------------------------------------------------

A2_security:

  extends: .station_base
  stage: security

  needs:
    - A0_intake

  script:

    - |
      curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 \
      -o /usr/local/bin/gitleaks

    - chmod +x /usr/local/bin/gitleaks

    - gitleaks detect --source . --no-git --report-format json --report-path ${STATION_OUT}/gitleaks.json || true

    - |
      copilot chat -p "
      Analyze security results.

      $(cat ${STATION_OUT}/gitleaks.json)

      Produce security_report.json
      " > ${STATION_OUT}/security_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/security_raw.json > ${STATION_OUT}/security_report.json

    - jq . ${STATION_OUT}/security_report.json

  artifacts:
    paths:
      - ${STATION_OUT}/security_report.json

# ------------------------------------------------
# A3 Prompt Injection Check
# ------------------------------------------------

A3_prompt:

  extends: .station_base
  stage: security

  needs:
    - A0_intake

  script:

    - |
      copilot chat -p "
      Detect prompt injection risks.

      $(cat ${STATION_OUT}/work_order.json)

      Output prompt_report.json
      " > ${STATION_OUT}/prompt_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/prompt_raw.json > ${STATION_OUT}/prompt_report.json

    - jq . ${STATION_OUT}/prompt_report.json

  artifacts:
    paths:
      - ${STATION_OUT}/prompt_report.json

# ------------------------------------------------
# A4 Sandbox Simulation
# ------------------------------------------------

A4_simulation:

  extends: .station_base
  stage: simulation

  needs:
    - A1_policy
    - A2_security
    - A3_prompt

  script:

    - |
      copilot chat -p "
      Simulate adversarial inputs.

      Provide sim_report.json
      " > ${STATION_OUT}/sim_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/sim_raw.json > ${STATION_OUT}/sim_report.json

    - jq . ${STATION_OUT}/sim_report.json

  artifacts:
    paths:
      - ${STATION_OUT}/sim_report.json

# ------------------------------------------------
# A5 Gate Decision
# ------------------------------------------------

A5_gate:

  extends: .station_base
  stage: gate

  needs:
    - A1_policy
    - A2_security
    - A3_prompt
    - A4_simulation

  script:

    - |
      copilot chat -p "
      Aggregate all reports.

      Decide PASS or BLOCK.

      $(cat ${STATION_OUT}/*.json)

      Output gate_decision.json
      " > ${STATION_OUT}/gate_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/gate_raw.json > ${STATION_OUT}/gate_decision.json

    - jq . ${STATION_OUT}/gate_decision.json

    - STATUS=$(jq -r '.status' ${STATION_OUT}/gate_decision.json)

    - |
      if [ "$STATUS" = "BLOCK" ]; then
        echo "Pipeline blocked"
        exit 1
      fi

# ------------------------------------------------
# A6 Merge Request Update
# ------------------------------------------------

A6_update:

  stage: update

  needs:
    - job: A5_gate
      optional: true

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl jq

  script:

    - |
      if [ ! -f "${STATION_OUT}/gate_decision.json" ]; then
        exit 0
      fi

    - STATUS=$(jq -r '.status' ${STATION_OUT}/gate_decision.json)

    - |
      BODY=$(jq -n \
        --arg status "$STATUS" \
        --arg url "$CI_PIPELINE_URL" \
        '{body: ("Agent Factory result: " + $status + "\nPipeline: " + $url)}')

    - |
      if [ -n "$GITLAB_TOKEN" ]; then
        curl --request POST \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "$BODY" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"
      fi