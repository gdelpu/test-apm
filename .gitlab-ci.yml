# =====================================================
# Merge Request Validation Pipeline
# =====================================================

stages:
  - validate

# -----------------------------------------------------
# Global Variables (merged)
# -----------------------------------------------------
variables:
  ENABLE_COPILOT_CLI: "false"

  VALIDATORS_DIR: "default/skills/ai-backbone-pr-checks/tools/scripts"
  REPORTS_DIR: "reports"

  STATION_OUT: "station_out"

  GIT_DEPTH: "0"

  GH_CONFIG_DIR: "${CI_PROJECT_DIR}/.gh_config"
  COPILOT_MAX_DIFF_LINES: "2000"
  COPILOT_CLI_VERSION: "1.0.4"

default:
  image: node:20-bookworm-slim
  retry: 1

# -----------------------------------------------------
# Templates
# -----------------------------------------------------

.mr_only:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

.station_base:
  extends: .mr_only
  before_script:
    - apt-get update -qq && apt-get install -y -qq git jq curl ca-certificates python3
    - npm install -g "@github/copilot@${COPILOT_CLI_VERSION}"

    - EXTRACT_JSON="${CI_PROJECT_DIR}/station-workflows/scripts/extract_json.py"
    - HMAC_TOOL="${CI_PROJECT_DIR}/station-workflows/scripts/hmac_artifact.py"

    - |
      if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
        git fetch --unshallow
      fi

    - mkdir -p ${STATION_OUT}

# =====================================================
# PR Validators
# =====================================================

validate:pr-auto:
  extends: .mr_only
  stage: validate
  image: python:3.11

  before_script:
    - apt-get update && apt-get install -y git
    - python3 -m pip install --upgrade pip PyYAML
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"

  script:
    - mkdir -p $REPORTS_DIR
    - python3 $VALIDATORS_DIR/pr_auto_validator.py \
        --base-ref origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME \
        --head-ref $CI_COMMIT_SHA \
        --out $REPORTS_DIR/pr-auto-validator.json

  artifacts:
    paths:
      - $REPORTS_DIR/pr-auto-validator.json
    expire_in: 14 days
    when: always


validate:yaml-workflows:
  extends: .mr_only
  stage: validate
  image: python:3.11

  before_script:
    - python3 -m pip install --upgrade pip PyYAML

  script:
    - mkdir -p $REPORTS_DIR
    - python3 $VALIDATORS_DIR/yaml_workflow_linter.py \
        --root . \
        --out $REPORTS_DIR/yaml-workflow-linter.json

  artifacts:
    paths:
      - $REPORTS_DIR/yaml-workflow-linter.json
    expire_in: 14 days
    when: always


validate:test-gaps:
  extends: .mr_only
  stage: validate
  image: python:3.11

  before_script:
    - apt-get update && apt-get install -y git
    - python3 -m pip install --upgrade pip PyYAML
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"

  script:
    - mkdir -p $REPORTS_DIR
    - python3 $VALIDATORS_DIR/test_gap_detector.py \
        --base-ref origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME \
        --head-ref $CI_COMMIT_SHA \
        --out $REPORTS_DIR/test-gap-detector.json

  artifacts:
    paths:
      - $REPORTS_DIR/test-gap-detector.json
    expire_in: 14 days
    when: always

  allow_failure: true

# =====================================================
# AI Station Validation
# =====================================================

validate:ai-intake:
  extends: .station_base
  stage: validate

  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - git diff --name-status origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME "$CI_COMMIT_SHA" > diff.txt

    - |
      timeout 300 copilot -s --output-format json \
        --available-tools \
        --no-ask-user \
        --add-dir "${CI_PROJECT_DIR}" -p "
      SYSTEM: You are a JSON-only API. Do NOT use tools. Respond with ONLY a JSON object.
      GOAL: Analyze MR ${CI_MERGE_REQUEST_IID}.
      FILES: $(cat diff.txt)

      Respond with EXACTLY this JSON schema, nothing else:
      {
        \"mr_id\": ${CI_MERGE_REQUEST_IID},
        \"priority\": \"P0\" | \"P1\" | \"P2\",
        \"risks\": [\"string\", ...]
      }
      " > ${STATION_OUT}/raw.json

    - python3 "$EXTRACT_JSON" < "${STATION_OUT}/raw.json" > "${STATION_OUT}/work_order.json"

  artifacts:
    paths:
      - "${STATION_OUT}/work_order.json"


validate:policy:
  extends: .station_base
  stage: validate

  script:
    - |
      PROMPT=$(cat "${CI_PROJECT_DIR}/station-workflows/stations/a1-policy-validation.prompt.md")

      timeout 600 copilot -s --output-format json \
        --available-tools \
        --no-ask-user \
        --add-dir "${CI_PROJECT_DIR}" -p "
      ${PROMPT}

      CHANGED_FILES:
      $(git diff --name-only origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME} ${CI_COMMIT_SHA})

      OUTPUT FORMAT: Respond with ONLY a raw JSON object, no prose.
      " > "${STATION_OUT}/policy_raw.json"

    - python3 "$EXTRACT_JSON" < "${STATION_OUT}/policy_raw.json" > "${STATION_OUT}/policy.json"

    - |
      STATUS=$(jq -r '.status' "${STATION_OUT}/policy.json")
      echo "Policy gate status: $STATUS"
      if [ "$STATUS" = "fail" ]; then
        echo "GATE FAILED: Policy validation reported critical/high findings."
        cat "${STATION_OUT}/policy.json"
        exit 1
      fi

  artifacts:
    paths:
      - "${STATION_OUT}/policy.json"


validate:security:
  extends: .station_base
  stage: validate

  script:
    - git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME $CI_COMMIT_SHA > "${STATION_OUT}/diff.patch"

    - |
      PROMPT=$(cat "${CI_PROJECT_DIR}/station-workflows/stations/a2-security-static.prompt.md")

      timeout 600 copilot -s --output-format json \
        --available-tools \
        --no-ask-user \
        --add-dir "${CI_PROJECT_DIR}" -p "
      ${PROMPT}

      DIFF:
      $(head -n ${COPILOT_MAX_DIFF_LINES} ${STATION_OUT}/diff.patch)

      OUTPUT FORMAT: Respond with ONLY a raw JSON object, no prose.
      " > "${STATION_OUT}/security_raw.json"

    - python3 "$EXTRACT_JSON" < "${STATION_OUT}/security_raw.json" > "${STATION_OUT}/security.json"

    - |
      STATUS=$(jq -r '.status' "${STATION_OUT}/security.json")
      echo "Security gate status: $STATUS"
      if [ "$STATUS" = "fail" ]; then
        echo "GATE FAILED: Security scan reported critical/high findings."
        cat "${STATION_OUT}/security.json"
        exit 1
      fi

  artifacts:
    paths:
      - "${STATION_OUT}/security.json"
    when: always