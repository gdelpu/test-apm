# =====================================================
# Merge Request Validation Pipeline
# =====================================================
#
# Two-phase design:
#   1. validate  — deterministic Python checks run in parallel
#   2. stations  — AI station orchestrator runs sequentially,
#                  only after blocking validators pass
# =====================================================

stages:
  - validate
  - stations
  - build
  - test
  - release
  - publish

# -----------------------------------------------------
# Global Variables
# -----------------------------------------------------
variables:
  ENABLE_COPILOT_CLI: "false"

  VALIDATORS_DIR: ".apm/skills/ai-backbone-pr-checks/tools/scripts"
  REPORTS_DIR: "reports"

  STATION_OUT: "station_out"
  STATION_DIR: "ci-gates/stations"
  STATION_TIMEOUT: "900"

  GIT_DEPTH: "0"

  GH_CONFIG_DIR: "${CI_PROJECT_DIR}/.gh_config"
  COPILOT_MAX_DIFF_LINES: "2000"
  COPILOT_CLI_VERSION: "1.0.4"

  # APM distribution
  APM_PACKAGE_NAME: "ssg-ai-backbone"
  APM_DIST_DIR: "dist"

default:
  image: node:20-bookworm-slim
  retry: 1

# -----------------------------------------------------
# Templates
# -----------------------------------------------------

.mr_only:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

.branch_and_tag:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    - if: '$CI_COMMIT_BRANCH'

.tag_only:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

.main_only:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# =====================================================
# PR Validators
# =====================================================

validate:pr-auto:
  extends: .mr_only
  stage: validate
  image: python:3.11

  before_script:
    - apt-get update && apt-get install -y git
    - python3 -m pip install --upgrade pip PyYAML
    - git fetch origin "+refs/heads/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME:refs/remotes/origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - mkdir -p $REPORTS_DIR

  script:
    - |
      python3 $VALIDATORS_DIR/pr_auto_validator.py \
        --base-ref origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME \
        --head-ref $CI_COMMIT_SHA \
        --out $REPORTS_DIR/pr-auto-validator.json || {
          echo '{"status":"error","summary":["pr_auto_validator.py crashed"],"blocking_issues":["Script failed before producing report"],"warnings":[]}' \
            > $REPORTS_DIR/pr-auto-validator.json
          exit 1
        }

  artifacts:
    paths:
      - $REPORTS_DIR/pr-auto-validator.json
    expire_in: 14 days
    when: always


validate:yaml-workflows:
  extends: .mr_only
  stage: validate
  image: python:3.11

  before_script:
    - python3 -m pip install --upgrade pip PyYAML
    - mkdir -p $REPORTS_DIR

  script:
    - |
      python3 $VALIDATORS_DIR/yaml_workflow_linter.py \
        --root . \
        --out $REPORTS_DIR/yaml-workflow-linter.json || {
          echo '{"status":"error","summary":["yaml_workflow_linter.py crashed"],"blocking_issues":["Script failed before producing report"],"warnings":[]}' \
            > $REPORTS_DIR/yaml-workflow-linter.json
          exit 1
        }

  artifacts:
    paths:
      - $REPORTS_DIR/yaml-workflow-linter.json
    expire_in: 14 days
    when: always


validate:test-gaps:
  extends: .mr_only
  stage: validate
  image: python:3.11

  before_script:
    - apt-get update && apt-get install -y git
    - python3 -m pip install --upgrade pip PyYAML
    - git fetch origin "+refs/heads/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME:refs/remotes/origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - mkdir -p $REPORTS_DIR

  script:
    - |
      python3 $VALIDATORS_DIR/test_gap_detector.py \
        --base-ref origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME \
        --head-ref $CI_COMMIT_SHA \
        --out $REPORTS_DIR/test-gap-detector.json || {
          echo '{"status":"error","summary":["test_gap_detector.py crashed"],"blocking_issues":["Script failed before producing report"],"warnings":[]}' \
            > $REPORTS_DIR/test-gap-detector.json
          exit 1
        }

  artifacts:
    paths:
      - $REPORTS_DIR/test-gap-detector.json
    expire_in: 14 days
    when: always

  allow_failure: true

# =====================================================
# AI Station Orchestrator
# =====================================================
# Dynamically discovers all .prompt.md / .agent.md files
# in ci-gates/stations/, sorts by prefix (a0…a7),
# and runs them sequentially via Copilot CLI.
#
# Runs ONLY after the two blocking deterministic validators
# pass (test-gaps is advisory and does not gate).
# =====================================================

stations:run-all:
  extends: .mr_only
  stage: stations
  image: node:20-bookworm-slim

  needs:
    - job: validate:pr-auto
      artifacts: true
    - job: validate:yaml-workflows
      artifacts: true

  before_script:
    - apt-get update -qq && apt-get install -y -qq git jq curl ca-certificates python3 findutils
    - npm install -g "@github/copilot@${COPILOT_CLI_VERSION}"
    - |
      if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
        git fetch --unshallow
      fi
    - mkdir -p ${STATION_OUT}

  script:
    - bash "${CI_PROJECT_DIR}/ci-gates/scripts/run_stations.sh"

  artifacts:
    paths:
      - ${STATION_OUT}/
      - ${REPORTS_DIR}/
    expire_in: 14 days
    when: always

# =====================================================
# APM Bundle Build
# =====================================================
# Builds distribution archives for all APM targets.
# Runs on branch pushes and tag pushes.
# Archives are stored as job artifacts.
# =====================================================

build:apm-bundles:
  extends: .branch_and_tag
  stage: build
  image: node:20-bookworm-slim

  before_script:
    - apt-get update -qq && apt-get install -y -qq coreutils
    - chmod +x scripts/apm-build.sh

  script:
    - bash scripts/apm-build.sh --output-dir "${APM_DIST_DIR}"

  artifacts:
    paths:
      - ${APM_DIST_DIR}/
    expire_in: 14 days

  cache:
    key: "apm-bundles-${CI_COMMIT_REF_SLUG}"
    paths:
      - ${APM_DIST_DIR}/

# =====================================================
# APM Bundle Smoke Test
# =====================================================
# Validates that built archives contain expected files.
# Runs after build, gates publish.
# =====================================================

test:apm-smoke:
  extends: .branch_and_tag
  stage: test
  image: node:20-bookworm-slim

  needs:
    - job: build:apm-bundles
      artifacts: true

  script:
    - |
      set -euo pipefail
      echo "── Smoke-testing APM bundles ──"
      FAIL=0
      for archive in ${APM_DIST_DIR}/*.tar.gz; do
        [ -f "$archive" ] || continue
        name=$(basename "$archive")
        echo "Checking: $name"
        file_count=$(tar -tzf "$archive" | wc -l)
        if [ "$file_count" -lt 1 ]; then
          echo "❌ $name is empty"
          FAIL=1
        else
          echo "✅ $name — $file_count entries"
        fi
      done
      if [ -f "${APM_DIST_DIR}/SHA256SUMS" ]; then
        echo "✅ SHA256SUMS present"
      else
        echo "⚠️  SHA256SUMS missing (non-blocking)"
      fi
      if [ "$FAIL" -ne 0 ]; then
        echo "❌ Smoke test failed"
        exit 1
      fi
      echo "✅ All archives verified"

# =====================================================
# APM Registry Publish
# =====================================================
# Publishes versioned archives to the GitLab Generic
# Package Registry. Runs ONLY on semver tag pipelines.
# Uses CI_JOB_TOKEN — no additional secrets needed.
# =====================================================

publish:apm-registry:
  extends: .tag_only
  stage: publish
  image: node:20-bookworm-slim

  needs:
    - job: test:apm-smoke
      artifacts: true

  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - chmod +x scripts/apm-publish.sh

  script:
    - bash scripts/apm-publish.sh --version "${CI_COMMIT_TAG}" --dist-dir "${APM_DIST_DIR}"

# =====================================================
# Auto-Release (tag creation)
# =====================================================
# Runs on pushes to main (i.e. after MR merge).
# Reads version from apm.yml, checks if tag already
# exists, and creates it via the GitLab API.
# The new tag triggers a separate tag pipeline that
# runs build → test → publish.
# =====================================================

release:auto-tag:
  extends: .main_only
  stage: release
  image: python:3.11-slim

  needs:
    - job: build:apm-bundles
      artifacts: false
    - job: test:apm-smoke
      artifacts: false

  script:
    - apt-get update -qq && apt-get install -y -qq git
    - |
      VERSION=$(python3 -c "
      import re
      with open('apm.yml') as f:
          for line in f:
              m = re.match(r'^version:\s*(.+)', line)
              if m:
                  print(m.group(1).strip())
                  break
      ")
      if [ -z "$VERSION" ]; then
        echo "❌ Could not read version from apm.yml"
        exit 1
      fi
      TAG="v${VERSION}"
      echo "Version from apm.yml: ${VERSION}  →  Tag: ${TAG}"
    - |
      if git tag -l "$TAG" | grep -q "$TAG"; then
        echo "✅ Tag ${TAG} already exists locally — skipping"
        exit 0
      fi
      git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      REMOTE_TAGS=$(git ls-remote --tags origin "refs/tags/${TAG}" 2>/dev/null)
      if [ -n "$REMOTE_TAGS" ]; then
        echo "✅ Tag ${TAG} already exists on remote — skipping"
        exit 0
      fi
    - |
      echo "Creating tag ${TAG} at ${CI_COMMIT_SHA}..."
      git tag -a "${TAG}" -m "Release ${TAG}" "${CI_COMMIT_SHA}"
      git push origin "${TAG}"
      echo "✅ Tag ${TAG} pushed — tag pipeline will run build → test → publish"

