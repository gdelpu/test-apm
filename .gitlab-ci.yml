# Agent Factory — Secure Station Pipeline (Corrected)

variables:
  STATION_OUT: "station_out"
  GIT_DEPTH: "0"
  NODE_ENV: "production"

stages:
  - setup
  - intake
  - validation
  - security
  - simulation
  - gate
  - update

default:
  image: debian:bookworm-slim
  retry: 2

cache:
  paths:
    - /root/.npm

# ------------------------------------------------
# Base template
# ------------------------------------------------

.station_base:
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl git jq ca-certificates nodejs npm

    # Ensure full git history
    - git fetch --unshallow || true

    # Token normalization
    - |
      if [ -n "$GITHUB_TOKEN" ] && [ -z "$GH_TOKEN" ]; then
        export GH_TOKEN="$GITHUB_TOKEN"
      fi
      export GITHUB_TOKEN="$GH_TOKEN"

    - |
      if ! command -v copilot >/dev/null; then
        npm install -g @githubnext/github-copilot-cli
      fi

    - mkdir -p ${STATION_OUT}

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/agents/**/*.agent.md"
        - "**/skills/**/SKILL.md"
        - "**/prompts/**/*.prompt.md"
        - "**/instructions/**/*.instructions.md"
        - "station-workflows/**"
        - ".gitlab-ci.yml"
      when: on_success
    - when: never

# ------------------------------------------------
# Setup
# ------------------------------------------------

setup:
  stage: setup
  script:
    - mkdir -p ${STATION_OUT}
    - echo "Environment ready"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
  artifacts:
    paths:
      - ${STATION_OUT}/

# ------------------------------------------------
# A0 Intake
# ------------------------------------------------

A0_intake:
  extends: .station_base
  stage: intake
  needs:
    - job: setup
      optional: true

  script:
    - |
      if [ -n "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" ]; then
        git diff --name-status "$CI_MERGE_REQUEST_DIFF_BASE_SHA" "$CI_COMMIT_SHA" > diff.txt
      else
        git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        git diff --name-status "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}" "$CI_COMMIT_SHA" > diff.txt
      fi

    - |
      copilot chat -p "
      Produce ONLY valid JSON.

      Create work_order.json describing this MR.

      MR: ${CI_MERGE_REQUEST_IID}
      TITLE: ${CI_MERGE_REQUEST_TITLE}

      CHANGED FILES:
      $(cat diff.txt)
      " > ${STATION_OUT}/work_order_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/work_order_raw.json > ${STATION_OUT}/work_order.json
    - jq . ${STATION_OUT}/work_order.json

  artifacts:
    paths:
      - ${STATION_OUT}/work_order.json

# ------------------------------------------------
# A1 Policy validation
# ------------------------------------------------

A1_policy:
  extends: .station_base
  stage: validation
  needs:
    - A0_intake

  script:
    - |
      copilot chat -p "
      Output ONLY JSON.

      Validate agent manifests referenced in:

      ${STATION_OUT}/work_order.json

      Return policy_report.json
      " > ${STATION_OUT}/policy_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/policy_raw.json > ${STATION_OUT}/policy_report.json
    - jq . ${STATION_OUT}/policy_report.json

  artifacts:
    paths:
      - ${STATION_OUT}/policy_report.json

# ------------------------------------------------
# A2 Security scan
# ------------------------------------------------

A2_security:
  extends: .station_base
  stage: security
  needs:
    - A0_intake

  script:
    - |
      curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 \
      -o /usr/local/bin/gitleaks
      chmod +x /usr/local/bin/gitleaks

    - gitleaks detect --source=. --no-git --report-format json --report-path ${STATION_OUT}/gitleaks.json || true

    - |
      copilot chat -p "
      Analyze this security report and produce security_report.json

      $(cat ${STATION_OUT}/gitleaks.json)
      " > ${STATION_OUT}/security_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/security_raw.json > ${STATION_OUT}/security_report.json
    - jq . ${STATION_OUT}/security_report.json

  artifacts:
    paths:
      - ${STATION_OUT}/security_report.json
      - ${STATION_OUT}/gitleaks.json

# ------------------------------------------------
# A3 Prompt injection check
# ------------------------------------------------

A3_prompt_injection:
  extends: .station_base
  stage: security
  needs:
    - A0_intake

  script:
    - |
      copilot chat -p "
      Check prompt injection risks.

      Read:
      ${STATION_OUT}/work_order.json

      Output JSON promptsec_report.json
      " > ${STATION_OUT}/prompt_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/prompt_raw.json > ${STATION_OUT}/promptsec_report.json
    - jq . ${STATION_OUT}/promptsec_report.json

  artifacts:
    paths:
      - ${STATION_OUT}/promptsec_report.json

# ------------------------------------------------
# A4 Sandbox simulation
# ------------------------------------------------

A4_sandbox:
  extends: .station_base
  stage: simulation
  needs:
    - A0_intake
    - A1_policy
    - A2_security
    - A3_prompt_injection

  script:
    - |
      copilot chat -p "
      Simulate malicious inputs against the agents.

      Use:
      ${STATION_OUT}/work_order.json

      Output sim_report.json
      " > ${STATION_OUT}/sim_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/sim_raw.json > ${STATION_OUT}/sim_report.json
    - jq . ${STATION_OUT}/sim_report.json

  artifacts:
    paths:
      - ${STATION_OUT}/sim_report.json

# ------------------------------------------------
# A5 Gate
# ------------------------------------------------

A5_gate:
  extends: .station_base
  stage: gate
  needs:
    - A1_policy
    - A2_security
    - A3_prompt_injection
    - A4_sandbox

  script:
    - |
      copilot chat -p "
      Aggregate these reports and decide gate status.

      $(cat ${STATION_OUT}/*.json)

      Output gate_decision.json
      " > ${STATION_OUT}/gate_raw.json

    - sed -n '/^{/,/}$/p' ${STATION_OUT}/gate_raw.json > ${STATION_OUT}/gate_decision.json

    - jq . ${STATION_OUT}/gate_decision.json

    - STATUS=$(jq -r '.status' ${STATION_OUT}/gate_decision.json)

    - |
      if [ "$STATUS" = "BLOCK" ]; then
        echo "Gate blocked"
        exit 1
      fi

  artifacts:
    paths:
      - ${STATION_OUT}/*.json
    expire_in: 7 days

# ------------------------------------------------
# A6 GitLab update
# ------------------------------------------------

A6_update:
  stage: update
  needs:
    - job: A5_gate
      artifacts: true
      optional: true

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq

  script:
    - |
      if [ ! -f "${STATION_OUT}/gate_decision.json" ]; then
        exit 0
      fi

    - STATUS=$(jq -r '.status' ${STATION_OUT}/gate_decision.json)

    - |
      BODY=$(jq -n \
        --arg status "$STATUS" \
        --arg url "$CI_PIPELINE_URL" \
        '{body: ("Agent Factory Result: " + $status + "\\nPipeline: " + $url)}')

    - |
      if [ -n "$GITLAB_TOKEN" ]; then
        curl --request POST \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "$BODY" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"
      fi

  artifacts:
    paths:
      - ${STATION_OUT}/