name: sdlc-ba
description: Full business analysis pipeline from brownfield audit through scoping, specification, and per-feature functional design with fan-out/fan-in orchestration.
type: delivery

# Default hooks applied to all production stations unless overridden.
# Validation-only stations (ba-validation) override post_hooks to omit confluence-push.
default_hooks:
  pre:
    - .apm/hooks/pre/input-validation/base.md
    - .apm/hooks/pre/input-validation/ba.md
  post:
    - .apm/hooks/post/quality-control.md
    - .apm/hooks/post/confluence-push.md

stations:
  # ─── System S0: Brownfield Audit ───────────────────────────────────
  - id: ba-audit-existing
    name: Existing System Audit
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-audit
    inputs: []
    outputs:
      - asis-001-existing-audit.md
    optional: true  # brownfield only
    gate:
      criteria:
        - "AS-IS functional snapshot covers all identified modules"
        - "Integration points and constraints are documented"
      severity: blocker

  - id: ba-audit-delta
    name: Delta Analysis
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-audit
    inputs:
      - asis-001-existing-audit.md
    outputs:
      - delta-001-delta-analysis.md
    optional: true  # brownfield only
    gate:
      criteria:
        - "Every functional area is classified as new/evolving/preserved/deprecated"
      severity: blocker

  # ─── System S0.5: Discovery Workshop ────────────────────────────────
  # Produces [DCO-001] — structured context from raw source documents.
  # Must run before scoping so all S1 agents have structured input.
  - id: ba-discovery
    name: Discovery Workshop
    agent: sdlc-ba-analyst
    skills:
      - sdlc-deliverable-validation
    skill_doc: sdlc-deliverable-validation/docs/sk-discovery.md
    inputs:
      - docs/0-inputs/ba/_source/
    outputs:
      - dco-001-discovery.md
    required_outputs:
      - dco-001-discovery.md
    gate:
      criteria:
        - "Discovery document [DCO-001] produced with structured context, stakeholder mapping, and proto-glossary"
        - "All raw source documents have been processed"
      severity: blocker

  # ─── System S1: Scoping ────────────────────────────────────────────
  - id: ba-vision
    name: Product Vision & Scope
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-scoping
    inputs:
      - dco-001-discovery.md
    outputs:
      - vis-001-product-vision.md
    gate:
      criteria:
        - "Measurable objectives defined"
        - "Clear IN/OUT scope boundaries"
      severity: blocker

  - id: ba-glossary
    name: Business Glossary
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-scoping
    inputs:
      - dco-001-discovery.md
    outputs:
      - glo-001-glossary.md
    parallel: true  # can run in parallel with vision
    gate:
      criteria:
        - "Ubiquitous language terms defined with precise definitions"
      severity: blocker

  - id: ba-actors
    name: Actors & Roles
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-scoping
    inputs:
      - glo-001-glossary.md
      - dco-001-discovery.md
    outputs:
      - act-001-actors-roles.md
    gate:
      criteria:
        - "All human and system actors identified"
        - "Permissions matrix defined"
      severity: blocker

  - id: ba-requirements
    name: Functional Requirements
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-scoping
    inputs:
      - vis-001-product-vision.md
      - glo-001-glossary.md
      - act-001-actors-roles.md
      - dco-001-discovery.md
    outputs:
      - exf-001-functional-requirements.md
    gate:
      criteria:
        - "Requirements are testable and traceable"
        - "Traceability anchors for R4J are present"
      severity: blocker

  # ─── System S2: Specification ──────────────────────────────────────
  - id: ba-domain-model
    name: Domain Model
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-specification
    inputs:
      - vis-001-product-vision.md
      - glo-001-glossary.md
      - act-001-actors-roles.md
    outputs:
      - dom-001-domain-model.md
    gate:
      criteria:
        - "Entities, attributes, and relationships are complete"
        - "Mermaid ER diagram included"
      severity: blocker

  - id: ba-epics
    name: Epic Decomposition
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-specification
    inputs:
      - dom-001-domain-model.md
    outputs:
      - epics/
    gate:
      criteria:
        - "Epics cover all functional requirements"
        - "Each epic has clear scope and boundaries"
        - "Epic count is between 1 and 5 inclusive (1 for simple apps, 2-4 typical, hard cap 5 — see sk-2.2-epics.md Step 1b)"
        - "Each epic contains between 4 and 8 features in its index"
      severity: blocker

  - id: ba-features
    name: Feature Specification (per epic)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-specification
    inputs:
      - epics/
    outputs:
      - features/
    gate:
      criteria:
        - "Each feature has a clear scope within its parent epic"
        - "Feature identifiers are sequential and unique"
        - "Each feature passes the litmus test: decomposable into 2-8 user stories, serves an identified actor, demonstrable in 5 min"
      severity: blocker

  - id: ba-business-rules
    name: Business Rules Consolidation
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-specification
    inputs:
      - dom-001-domain-model.md
      - features/
    outputs:
      - business-rules/
    gate:
      criteria:
        - "Rules are deduplicated and classified by type"
        - "Rules dispatched to per-feature directories"
      severity: blocker

  # ─── System S3: Functional Design (per feature) ───────────────────
  - id: ba-user-stories
    name: User Stories (per feature)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-functional-design
    inputs:
      - features/
      - business-rules/
    outputs:
      - user-stories/
    required_outputs:
      - user-stories/
    gate:
      criteria:
        - "Atomic stories with GWT acceptance criteria"
        - "Stories trace to feature requirements"
      severity: blocker

  - id: ba-user-journeys
    name: User Journeys (per feature)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-functional-design
    inputs:
      - user-stories/
    outputs:
      - user-journeys/
    required_outputs:
      - user-journeys/
    conditional: has_screens  # only required for features with UI screens
    gate:
      criteria:
        - "Journeys chain stories into end-to-end flows"
        - "Mermaid diagrams included"
      severity: blocker

  - id: ba-screen-specs
    name: Screen Specifications (per feature)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-functional-design
    inputs:
      - user-stories/
      - user-journeys/
    outputs:
      - screen-specs/
    conditional: has_screens
    gate:
      criteria:
        - "Components, fields, and validation rules defined"
      severity: blocker

  - id: ba-figma-prototypes
    name: Interactive HTML Prototypes (per feature)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-functional-design
    inputs:
      - screen-specs/
      - user-journeys/
    outputs:
      - prototypes/
    conditional: has_screens  # only for features with UI screens
    gate:
      criteria:
        - "Navigable HTML/CSS prototype generated for each screen spec"
        - "Prototype navigation matches user journeys"
      severity: blocker

  - id: ba-batch-specs
    name: Batch Specifications (per feature)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-functional-design
    inputs:
      - features/
      - business-rules/
    outputs:
      - batch-specs/
    conditional: has_batches
    gate:
      criteria:
        - "Input/output formats, volumes, and scheduling defined"
      severity: blocker

  - id: ba-notifications
    name: Notification Specifications (per feature)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-functional-design
    inputs:
      - user-stories/
      - user-journeys/
    outputs:
      - notifications/
    conditional: has_notifications
    gate:
      criteria:
        - "Channels, recipients, triggers, and content templates defined"
      severity: blocker

  - id: ba-test-scenarios
    name: Test Scenarios (per feature)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-functional-design
    inputs:
      - user-journeys/
      - screen-specs/
      - batch-specs/
      - notifications/
    outputs:
      - test-scenarios/
    required_outputs:
      - test-scenarios/
    gate:
      criteria:
        - "Gherkin-format scenarios cover stories and rules"
        - "Coverage matrix included"
      severity: blocker

  - id: ba-test-data
    name: Test Data Catalogue (per feature)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-functional-design
    inputs:
      - test-scenarios/
    outputs:
      - test-data/
    required_outputs:
      - test-data/
    gate:
      criteria:
        - "Structured test dataset catalogue with pre-conditions for each scenario"
      severity: blocker

  - id: ba-e2e-plan
    name: E2E Test Plan (project scope)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-ba-functional-design
    inputs:
      - test-scenarios/
      - test-data/
    outputs:
      - e2e-plan-001.md
    required_outputs:
      - e2e-plan-001.md
    gate:
      criteria:
        - "Cross-feature E2E journeys defined"
        - "Xray campaign structure prepared"
      severity: blocker

  # ─── Quality Gate ──────────────────────────────────────────────────
  - id: ba-validation
    name: BA Deliverable Validation
    agent: sdlc-ba-analyst
    skills:
      - sdlc-deliverable-validation
    inputs:
      - e2e-plan-001.md
    outputs:
      - ba-validation-report.md
    required_outputs:
      - ba-validation-report.md
    gate:
      criteria:
        - "All deliverables pass quality audit"
        - "Cross-deliverable coherence verified"
        - "Traceability chain complete: EXF → EP → FT → US → BR → SCE"
        - "If feature has_screens: user journeys (UF) and screen specs exist for each feature with screens"
        - "If feature has_screens: HTML prototypes generated and navigation matches journeys"
        - "If feature has_batches: batch specifications exist"
        - "If feature has_notifications: notification specifications exist"
        - "Test data catalogue produced for each feature"
        - "All required_outputs from upstream stations exist on disk"
      severity: blocker

  # ─── Independent Review ────────────────────────────────────────────
  - id: ba-review
    name: BA Independent Review
    agent: sdlc-ba-reviewer
    skills:
      - sdlc-deliverable-validation
      - sdlc-review-arbitration
    inputs:
      - ba-validation-report.md
    outputs:
      - ba-review-report.md
    required_outputs:
      - ba-review-report.md
    gate:
      criteria:
        - "All BA deliverables independently reviewed"
        - "No CONFLICT verdicts, OR human has arbitrated all conflicts"
        - "Status promotions issued for validated deliverables"
      severity: blocker
      on_conflict: pause

config:
  output_dir: outputs/docs/1-prd/
  state_file: workflow-state.md
  allow_resume: true
  allow_skip_gate: true
  nestable: true
