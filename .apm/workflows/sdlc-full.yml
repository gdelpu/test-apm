name: sdlc-full
description: Composite SDLC pipeline orchestrating all four domains — BA specification, Tech architecture, Test campaigns, and Steer governance — with inter-domain quality gates and sprint-iterative execution.
type: delivery

# Hooks are inherited from sub-workflows (sdlc-ba, sdlc-tech, sdlc-steer).
# Only the full-pipeline stations below declare hooks explicitly.
default_hooks:
  pre:
    - .apm/hooks/pre/input-validation/base.md
  post:
    - .apm/hooks/post/quality-control.md

stations:
  # ─── Phase 1: Project Initialization ───────────────────────────────
  - id: scaffold
    name: Directory Scaffold
    agent: sdlc-coordinator
    skills:
      - sdlc-scaffold
    inputs: []
    outputs:
      - outputs/
    required_outputs:
      - outputs/docs/
    gate:
      criteria:
        - "Directory structure created"
      severity: blocker

  - id: project-init
    name: Project Initialization (P0)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-init
    inputs:
      - outputs/
    outputs:
      - pil-001-project-sheet.md
      - kpi-001-baseline.md
    required_outputs:
      - pil-001-project-sheet.md
      - kpi-001-baseline.md
    gate:
      criteria:
        - "Project sheet and KPI baselines established"
      severity: blocker

  # ─── Phase 1b: Discovery Workshop ──────────────────────────────────
  # Produces [DCO-001] — structured context from raw source documents.
  # Must run before scoping (S1) so all BA agents have structured input.
  - id: ba-discovery
    name: Discovery Workshop (S0.5)
    agent: sdlc-ba-analyst
    skills:
      - sdlc-deliverable-validation
    skill_doc: sdlc-deliverable-validation/docs/sk-discovery.md
    inputs:
      - docs/0-inputs/ba/_source/
    outputs:
      - dco-001-discovery.md
    required_outputs:
      - dco-001-discovery.md
    gate:
      criteria:
        - "Discovery document [DCO-001] produced with structured context, stakeholder mapping, and proto-glossary"
        - "All raw source documents have been processed"
      severity: blocker

  # ─── Phase 2: BA Specification (S0-S2) ─────────────────────────────
  # Brownfield audit (S0), scoping (S1), and specification (S2) only.
  # Functional design (S3) is deferred to the sprint loop.
  - id: ba-spec-pipeline
    name: BA Specification Pipeline (S0-S2)
    agent: sdlc-coordinator
    skills:
      - sdlc-ba-audit
      - sdlc-ba-scoping
      - sdlc-ba-specification
    inputs:
      - pil-001-project-sheet.md
      - dco-001-discovery.md
    outputs:
      - exf-001-functional-requirements.md
      - dom-001-domain-model.md
      - features/
      - business-rules/
    required_outputs:
      - exf-001-functional-requirements.md
      - features/
    gate:
      criteria:
        - "BA S0-S2 complete: vision, glossary, actors, requirements, domain model, epics, features, business rules"
        - "Traceability chain verified: EXF → EP → FT"
        - "Epic count between 1 and 5 (1 for simple apps, 2-4 typical); each epic has 4-8 features; each feature passes the litmus test (decomposable, actor-scoped, demonstrable)"
        - "Requirements catalogue at capability level (target 15-30 requirements, not individual rules)"
      severity: blocker

  # ─── Phase 2b: BA Independent Review ───────────────────────────────
  - id: ba-review
    name: BA Independent Review
    agent: sdlc-ba-reviewer
    skills:
      - sdlc-deliverable-validation
      - sdlc-review-arbitration
    inputs:
      - ba-validation-report.md
    outputs:
      - ba-review-report.md
    required_outputs:
      - ba-review-report.md
    gate:
      criteria:
        - "All BA deliverables independently reviewed"
        - "No CONFLICT verdicts, OR human has arbitrated all conflicts"
        - "Status promotions issued for validated deliverables"
      severity: blocker
      on_conflict: pause  # halt for human arbitration when CONFLICT detected

  # ─── Phase 3: Technical Architecture (T0-T1) ──────────────────────
  # Brownfield audit (T0) and architecture (T1) only.
  # Design (T2) and implementation (T3) are deferred to the sprint loop.
  - id: tech-archi-pipeline
    name: Tech Architecture Pipeline (T0-T1)
    agent: sdlc-coordinator
    skills:
      - sdlc-tech-audit
      - sdlc-tech-architecture
    inputs:
      - exf-001-functional-requirements.md
      - dom-001-domain-model.md
    outputs:
      - ctx-001-system-context.md
      - adr/
      - stk-001-stack-conventions.md
      - enb-000-index.md
    required_outputs:
      - ctx-001-system-context.md
      - stk-001-stack-conventions.md
    gate:
      criteria:
        - "C4 system context and ADRs produced"
        - "Stack conventions consolidated"
        - "Enablers prioritized with wave resolution"
      severity: blocker

  # ─── Phase 4: Sprint Planning (P1) ────────────────────────────────
  # Sprint planning requires BA specs (S0-S2), BA review, and tech
  # architecture (T0-T1) to batch features into sprints with constraints.
  - id: sprint-planning
    name: Sprint Planning (P1)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-planning
    inputs:
      - exf-001-functional-requirements.md
      - features/
      - enb-000-index.md
      - stk-001-stack-conventions.md
      - ba-review-report.md
    outputs:
      - plan-001-sprint-planning.md
      - rdp-001-roadmap.md
      - rsk-001-risk-register.md
    required_outputs:
      - plan-001-sprint-planning.md
      - rsk-001-risk-register.md
    gate:
      criteria:
        - "Features batched into sprints with technical constraints considered"
        - "Roadmap and risk register complete"
      severity: blocker

  # ─── Phase 5: Sprint Loop ─────────────────────────────────────────
  # Per-sprint iteration: BA functional design → Tech design →
  # Tech implementation (waves) → Tech quality → Sprint tracking.
  # The loop repeats for each sprint defined in plan-001.

  - id: ba-functional-design
    name: BA Functional Design (S3)
    agent: sdlc-coordinator
    skills:
      - sdlc-ba-functional-design
    inputs:
      - plan-001-sprint-planning.md
      - features/
      - business-rules/
    outputs:
      - user-stories/
      - user-journeys/
      - screen-specs/
      - prototypes/
      - test-scenarios/
      - test-data/
      - e2e-plan-001.md
      - ba-validation-report.md
    required_outputs:
      - user-stories/
      - test-scenarios/
      - ba-validation-report.md
    gate:
      criteria:
        - "All S3 deliverables for sprint scope produced"
        - "Traceability chain complete: FT → US → BR → SCE"
        - "If feature has_screens: screen specs, prototypes, and user journeys produced"
        - "Test data catalogue produced for each feature in sprint scope"
      severity: blocker

  - id: tech-design
    name: Tech Design (T2)
    agent: sdlc-coordinator
    skills:
      - sdlc-tech-design
    inputs:
      - plan-001-sprint-planning.md
      - ba-validation-report.md
      - stk-001-stack-conventions.md
      - adr/
    outputs:
      - dat-001-data-model.md
      - api-contracts/
      - tst-001-test-strategy.md
      - imp-001-implementation-plan.md
      - coding-agent-briefing.md
    required_outputs:
      - imp-001-implementation-plan.md
    gate:
      criteria:
        - "Data model, API contracts, test strategy, and implementation plan produced"
        - "BA-Tech traceability verified"
        - "Implementation plan aligned with sprint planning"
      severity: blocker

  # ─── Phase 4b: Tech Independent Review ─────────────────────────────
  - id: tech-review
    name: Tech Independent Review
    agent: sdlc-tech-reviewer
    skills:
      - sdlc-deliverable-validation
      - sdlc-review-arbitration
    inputs:
      - imp-001-implementation-plan.md
    outputs:
      - tech-review-report.md
    required_outputs:
      - tech-review-report.md
    gate:
      criteria:
        - "All Tech deliverables independently reviewed"
        - "No CONFLICT verdicts, OR human has arbitrated all conflicts"
        - "BA-Tech traceability verified by independent reviewer"
        - "Status promotions issued for validated deliverables"
      severity: blocker
      on_conflict: pause  # halt for human arbitration when CONFLICT detected

  # ─── Phase 5: Implementation ───────────────────────────────────────
  - id: implementation
    name: Code Implementation
    agent: implementer
    skills:
      - sdlc-tech-implementation
    inputs:
      - imp-001-implementation-plan.md
      - stk-001-stack-conventions.md
      - dat-001-data-model.md
      - api-contracts/
      - enb-000-index.md
    outputs:
      - wave-report.md
      - implementation-log.md
    required_outputs:
      - wave-report.md
    gate:
      criteria:
        - "All sprint wave items implemented and validated"
        - "Code compiles and all tests pass"
      severity: blocker

  - id: tech-quality
    name: Tech Continuous Quality (T4)
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-quality
    inputs:
      - imp-001-implementation-plan.md
      - tst-001-test-strategy.md
      - wave-report.md
    outputs:
      - drift-report.md
      - e2e-scripts-001-playwright.md
    gate:
      criteria:
        - "Drift detection completed for sprint scope"
        - "E2E Playwright scripts generated for testable flows"
      severity: warning

  - id: sprint-tracking
    name: Sprint Tracking (P2)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-sprint
    inputs:
      - wave-report.md
      - drift-report.md
    outputs:
      - sprint-progress.md
      - sprint-risks.md
    required_outputs:
      - sprint-progress.md
    gate:
      criteria:
        - "Sprint progress documented"
        - "Risks assessed"
      severity: warning
    loop:
      description: "Stations ba-functional-design through sprint-tracking repeat for each sprint defined in plan-001-sprint-planning.md. Each sprint scopes a subset of features from the backlog."
      per_sprint: [ba-functional-design, tech-design, tech-implementation, tech-quality, sprint-tracking]
      max_iterations: 12  # hard cap — prevents unbounded sprint loop from resource exhaustion

  # ─── Phase 6: Test Campaigns ───────────────────────────────────────
  # Run after all sprints are completed.
  - id: test-campaign
    name: E2E/UAT Campaign (E1)
    agent: sdlc-test-executor
    skills:
      - sdlc-test-campaign
    inputs:
      - e2e-scripts-001-playwright.md
      - e2e-plan-001.md
      - test-scenarios/
    outputs:
      - campaign-report.md
    required_outputs:
      - campaign-report.md
    gate:
      criteria:
        - "Campaign pass rate above threshold"
        - "Critical anomalies resolved"
      severity: blocker

  - id: test-performance
    name: Performance Campaign (E2)
    agent: sdlc-test-executor
    skills:
      - sdlc-test-performance
    inputs:
      - tst-001-test-strategy.md
    outputs:
      - performance-report.md
    required_outputs:
      - performance-report.md
    parallel: true  # can run in parallel with campaign
    gate:
      criteria:
        - "Performance within defined thresholds"
      severity: blocker

  # ─── Phase 7: Quality Validation ───────────────────────────────────
  - id: quality-validation
    name: Quality Validation
    agent: workflow-orchestrator
    skills:
      - workflow-engine
    inputs:
      - implementation-log.md
    outputs:
      - quality-report.md
    required_outputs:
      - quality-report.md
    gate:
      criteria:
        - "All quality validation stations pass"
      severity: blocker

  # ─── Phase 9: Governance ───────────────────────────────────────────
  - id: steer-copil
    name: COPIL Preparation (P3)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-governance
    inputs:
      - quality-report.md
      - campaign-report.md
      - performance-report.md
      - sprint-risks.md
    outputs:
      - copil.md
    required_outputs:
      - copil.md
    gate:
      criteria:
        - "Technical and sponsor sections included"
        - "Key decisions documented"
      severity: blocker

  # ─── Phase 9b: Steer Independent Review ────────────────────────────
  - id: steer-review
    name: Steer Independent Review
    agent: sdlc-steer-reviewer
    skills:
      - sdlc-deliverable-validation
      - sdlc-review-arbitration
    inputs:
      - copil.md
      - quality-report.md
      - campaign-report.md
      - performance-report.md
      - sprint-risks.md
      - sprint-progress.md
    outputs:
      - steer-review-report.md
    required_outputs:
      - steer-review-report.md
    gate:
      criteria:
        - "All Steer deliverables independently reviewed"
        - "Cross-domain accuracy verified against source reports"
        - "No CONFLICT verdicts, OR human has arbitrated all conflicts"
        - "Status promotions issued for validated deliverables"
      severity: blocker
      on_conflict: pause  # halt for human arbitration when CONFLICT detected

  # ─── Phase 9c: Go/No-Go Decision ──────────────────────────────────
  - id: steer-go-nogo
    name: Go/No-Go Decision (P3)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-governance
    hooks:
      pre:
        - .apm/hooks/pre/verify-source-manifest.md
    inputs:
      - steer-review-report.md
      - copil.md
      - quality-report.md
      - campaign-report.md
      - performance-report.md
    outputs:
      - gng-001-go-nogo.md
    required_outputs:
      - gng-001-go-nogo.md
    gate:
      criteria:
        - "All domain data aggregated"
        - "Go/No-Go decision documented with evidence"
        - "COPIL pack has been independently reviewed (steer-review passed)"
      severity: blocker

config:
  output_dir: outputs/
  state_file: workflow-state.md
  allow_resume: true
  allow_skip_gate: true
  nestable: false
