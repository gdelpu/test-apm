name: sdlc-full
description: Composite SDLC pipeline orchestrating all four domains — BA specification, Tech architecture, Test campaigns, and Steer governance — with inter-domain quality gates.
type: delivery

# Hooks are inherited from sub-workflows (sdlc-ba, sdlc-tech, sdlc-steer).
# Only the full-pipeline stations below declare hooks explicitly.
default_hooks:
  pre:
    - .apm/hooks/pre/input-validation/base.md
  post:
    - .apm/hooks/post/quality-control.md

stations:
  # ─── Phase 1: Project Initialization ───────────────────────────────
  - id: scaffold
    name: Directory Scaffold
    agent: sdlc-coordinator
    skills:
      - sdlc-scaffold
    inputs: []
    outputs:
      - outputs/
    required_outputs:
      - outputs/docs/
    gate:
      criteria:
        - "Directory structure created"
      severity: blocker

  - id: project-init
    name: Project Initialization (P0)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-init
    inputs:
      - outputs/
    outputs:
      - pil-001-project-sheet.md
      - kpi-001-baseline.md
    required_outputs:
      - pil-001-project-sheet.md
      - kpi-001-baseline.md
    gate:
      criteria:
        - "Project sheet and KPI baselines established"
      severity: blocker

  # ─── Phase 2: Business Analysis ────────────────────────────────────
  - id: ba-pipeline
    name: BA Pipeline (S0-S3)
    agent: sdlc-coordinator
    skills:
      - sdlc-ba-audit
      - sdlc-ba-scoping
      - sdlc-ba-specification
      - sdlc-ba-functional-design
    inputs:
      - pil-001-project-sheet.md
    outputs:
      - ba-validation-report.md
    required_outputs:
      - ba-validation-report.md
    gate:
      criteria:
        - "All BA systems complete"
        - "Traceability chain verified: EXF → EP → FT → US → BR → SCE"
        - "If feature has_screens: user journeys (UF) exist for each feature with screens"
      severity: blocker

  # ─── Phase 2b: BA Independent Review ───────────────────────────────
  - id: ba-review
    name: BA Independent Review
    agent: sdlc-ba-reviewer
    skills:
      - sdlc-deliverable-validation
      - sdlc-review-arbitration
    inputs:
      - ba-validation-report.md
    outputs:
      - ba-review-report.md
    required_outputs:
      - ba-review-report.md
    gate:
      criteria:
        - "All BA deliverables independently reviewed"
        - "No CONFLICT verdicts, OR human has arbitrated all conflicts"
        - "Status promotions issued for validated deliverables"
      severity: blocker
      on_conflict: pause  # halt for human arbitration when CONFLICT detected

  # ─── Phase 3: Sprint Planning ──────────────────────────────────────
  - id: sprint-planning
    name: Sprint Planning (P1)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-planning
    inputs:
      - ba-review-report.md
    outputs:
      - plan-001-sprint-planning.md
      - rdp-001-roadmap.md
      - rsk-001-risk-register.md
    required_outputs:
      - plan-001-sprint-planning.md
      - rsk-001-risk-register.md
    gate:
      criteria:
        - "Features batched into sprints"
        - "Roadmap and risk register complete"
      severity: blocker

  # ─── Phase 4: Technical Architecture & Design ──────────────────────
  - id: tech-pipeline
    name: Tech Pipeline (T0-T4)
    agent: sdlc-coordinator
    skills:
      - sdlc-tech-audit
      - sdlc-tech-architecture
      - sdlc-tech-design
      - sdlc-tech-implementation
      - sdlc-tech-quality
    inputs:
      - plan-001-sprint-planning.md
      - ba-validation-report.md
    outputs:
      - imp-001-implementation-plan.md
    required_outputs:
      - imp-001-implementation-plan.md
    gate:
      criteria:
        - "All Tech systems complete"
        - "BA-Tech traceability verified"
        - "Implementation plan and CLAUDE.md compiled"
      severity: blocker

  # ─── Phase 4b: Tech Independent Review ─────────────────────────────
  - id: tech-review
    name: Tech Independent Review
    agent: sdlc-tech-reviewer
    skills:
      - sdlc-deliverable-validation
      - sdlc-review-arbitration
    inputs:
      - imp-001-implementation-plan.md
    outputs:
      - tech-review-report.md
    required_outputs:
      - tech-review-report.md
    gate:
      criteria:
        - "All Tech deliverables independently reviewed"
        - "No CONFLICT verdicts, OR human has arbitrated all conflicts"
        - "BA-Tech traceability verified by independent reviewer"
        - "Status promotions issued for validated deliverables"
      severity: blocker
      on_conflict: pause  # halt for human arbitration when CONFLICT detected

  # ─── Phase 5: Implementation ───────────────────────────────────────
  - id: implementation
    name: Code Implementation
    agent: implementer
    skills:
      - code-implementation
    inputs:
      - imp-001-implementation-plan.md
    outputs:
      - implementation-log.md
    required_outputs:
      - implementation-log.md
    gate:
      criteria:
        - "Code compiles without errors"
        - "All tests pass"
      severity: blocker

  # ─── Phase 6: Test Campaigns ───────────────────────────────────────
  - id: test-campaign
    name: E2E/UAT Campaign
    agent: sdlc-test-executor
    skills:
      - sdlc-test-campaign
    inputs:
      - implementation-log.md
    outputs:
      - campaign-report.md
    required_outputs:
      - campaign-report.md
    gate:
      criteria:
        - "Campaign pass rate above threshold"
        - "Critical anomalies resolved"
      severity: blocker

  - id: test-performance
    name: Performance Campaign
    agent: sdlc-test-executor
    skills:
      - sdlc-test-performance
    inputs:
      - implementation-log.md
    outputs:
      - performance-report.md
    required_outputs:
      - performance-report.md
    parallel: true  # can run in parallel with campaign
    gate:
      criteria:
        - "Performance within defined thresholds"
      severity: blocker

  # ─── Phase 7: Sprint Tracking ──────────────────────────────────────
  - id: sprint-tracking
    name: Sprint Tracking (P2)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-sprint
    inputs:
      - campaign-report.md
      - performance-report.md
    outputs:
      - sprint-progress.md
      - sprint-risks.md
    required_outputs:
      - sprint-progress.md
    gate:
      criteria:
        - "Sprint progress documented"
        - "Risks assessed"
      severity: warning

  # ─── Phase 8: Quality Validation ───────────────────────────────────
  - id: quality-validation
    name: Quality Validation
    agent: workflow-orchestrator
    skills:
      - workflow-engine
    inputs:
      - implementation-log.md
    outputs:
      - quality-report.md
    required_outputs:
      - quality-report.md
    gate:
      criteria:
        - "All quality validation stations pass"
      severity: blocker

  # ─── Phase 9: Governance ───────────────────────────────────────────
  - id: steer-copil
    name: COPIL Preparation (P3)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-governance
    inputs:
      - quality-report.md
      - campaign-report.md
      - performance-report.md
      - sprint-risks.md
    outputs:
      - copil.md
    required_outputs:
      - copil.md
    gate:
      criteria:
        - "Technical and sponsor sections included"
        - "Key decisions documented"
      severity: blocker

  # ─── Phase 9b: Steer Independent Review ────────────────────────────
  - id: steer-review
    name: Steer Independent Review
    agent: sdlc-steer-reviewer
    skills:
      - sdlc-deliverable-validation
      - sdlc-review-arbitration
    inputs:
      - copil.md
      - quality-report.md
      - campaign-report.md
      - performance-report.md
      - sprint-risks.md
      - sprint-progress.md
    outputs:
      - steer-review-report.md
    required_outputs:
      - steer-review-report.md
    gate:
      criteria:
        - "All Steer deliverables independently reviewed"
        - "Cross-domain accuracy verified against source reports"
        - "No CONFLICT verdicts, OR human has arbitrated all conflicts"
        - "Status promotions issued for validated deliverables"
      severity: blocker
      on_conflict: pause  # halt for human arbitration when CONFLICT detected

  # ─── Phase 9c: Go/No-Go Decision ──────────────────────────────────
  - id: steer-go-nogo
    name: Go/No-Go Decision (P3)
    agent: sdlc-steer-manager
    skills:
      - sdlc-steer-governance
    hooks:
      pre:
        - .apm/hooks/pre/verify-source-manifest.md
    inputs:
      - steer-review-report.md
      - copil.md
      - quality-report.md
      - campaign-report.md
      - performance-report.md
    outputs:
      - gng-001-go-nogo.md
    required_outputs:
      - gng-001-go-nogo.md
    gate:
      criteria:
        - "All domain data aggregated"
        - "Go/No-Go decision documented with evidence"
        - "COPIL pack has been independently reviewed (steer-review passed)"
      severity: blocker

config:
  output_dir: outputs/
  state_file: workflow-state.md
  allow_resume: true
  allow_skip_gate: true
  nestable: false
