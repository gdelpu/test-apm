name: sdlc-tech
description: Full technical architecture and design pipeline from brownfield audit through architecture, incremental design, sprint-iterative implementation, and continuous quality monitoring.
type: delivery

# Default hooks applied to all production stations unless overridden.
default_hooks:
  pre:
    - .apm/hooks/pre/input-validation/base.md
    - .apm/hooks/pre/input-validation/tech.md
    - hook: .apm/hooks/soprasteria-dep/pre-input-validation.md
      severity: warning
      condition: "config.dep_access != 'none'"
  post:
    - .apm/hooks/post/quality-control.md
    - .apm/hooks/post/confluence-push.md

stations:
  # ─── System T0: Brownfield Technical Audit ─────────────────────────
  - id: tech-audit
    name: Technical Stack Audit
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-audit
    inputs: []
    outputs:
      - tech-asis-001-technical-audit.md
    optional: true  # brownfield only
    gate:
      criteria:
        - "Current stack fully assessed"
        - "Compliance gaps identified"
      severity: blocker

  - id: tech-gap
    name: Gap Analysis
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-audit
    inputs:
      - tech-asis-001-technical-audit.md
    outputs:
      - gap-001-technical-gap.md
    optional: true  # brownfield only
    gate:
      criteria:
        - "Migration paths defined with effort estimates"
      severity: blocker

  # ─── System T1: Architecture ───────────────────────────────────────
  - id: tech-system-context
    name: System Context (C4)
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-architecture
    inputs: []
    outputs:
      - ctx-001-system-context.md
    gate:
      criteria:
        - "C4 Level 1-2 diagrams produced"
        - "All integrations and external systems documented"
      severity: blocker

  - id: tech-adrs
    name: Architecture Decision Records
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-architecture
    inputs:
      - ctx-001-system-context.md
    outputs:
      - adr/
    post_hooks:
      - hook: post/quality-control.md
        severity: blocker
      - hook: post/adr-completeness.md
        severity: blocker
      - hook: post/confluence-push.md
        severity: warning
    gate:
      criteria:
        - "Each ADR has context, decision, rationale, confidence level"
        - "Security and observability ADRs included"
        - "adr-000-index.md has dep_access field set (full|partial|none)"
        - "ADR-ENV-DEV, ADR-ENV-QUALIF, ADR-ENV-CLIENT all exist"
        - "ADR-ENV-QUALIF has dep_access in YAML front matter (always required)"
        - "ADR-ENV-QUALIF has pb_coverage in YAML front matter (required only if dep_access != none)"
        - "pb-provisioning-plan.json exists if pb_coverage is full or partial"
        - "All 3 environment ADRs include an infrastructure provisioning plan section"
      severity: blocker

  - id: tech-stack
    name: Stack Extraction & Consolidation
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-architecture
    inputs:
      - adr/
    outputs:
      - stk-001-stack-conventions.md
    gate:
      criteria:
        - "Unified stack document with no contradictions"
        - "Stack-specific skills selected from registry"
      severity: blocker

  - id: tech-enablers
    name: Enabler Extraction & Index
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-architecture
    inputs:
      - adr/
      - stk-001-stack-conventions.md
    outputs:
      - enb-000-index.md
    gate:
      criteria:
        - "Enablers prioritized with wave resolution"
      severity: blocker

  # ─── System T2: Technical Design ───────────────────────────────────
  - id: tech-data-model
    name: Data Model
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-design
    inputs:
      - stk-001-stack-conventions.md
    outputs:
      - dat-001-data-model.md
    gate:
      criteria:
        - "DDL-like data model with FK/indexes"
        - "Migration strategy defined"
        - "Traces to BA domain model"
      severity: blocker

  - id: tech-api-contracts
    name: API Contracts
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-design
    inputs:
      - dat-001-data-model.md
    outputs:
      - api-contracts/
    gate:
      criteria:
        - "OpenAPI-compliant contracts"
        - "Standardized error responses"
        - "Each API traces to user stories"
      severity: blocker

  - id: tech-test-strategy
    name: Test Strategy
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-design
    inputs:
      - api-contracts/
    outputs:
      - tst-001-test-strategy.md
    gate:
      criteria:
        - "Test pyramid defined with coverage thresholds"
        - "BA scenarios mapped to technical tests"
      severity: blocker

  - id: tech-impl-plan
    name: Implementation Plan
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-design
    inputs:
      - tst-001-test-strategy.md
      - plan-001-sprint-planning.md
    outputs:
      - imp-001-implementation-plan.md
      - coding-agent-briefing.md
    gate:
      criteria:
        - "Ordered wave plan for implementation"
        - "Coding agent briefing compiled"
        - "Enabler/feature allocation matches sprint planning per PLAN-001; deviations documented with justification"
      severity: blocker

  - id: tech-provider-bootstrap
    name: Provider Bootstrap
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-design
    inputs:
      - imp-001-implementation-plan.md
      - coding-agent-briefing.md
    outputs:
      - provider-specific-artifacts/
    optional: true  # skip if no provider detected or not needed
    gate:
      criteria:
        - "Provider-specific artifacts generated for detected coding agent"
      severity: warning

  # ─── System T3: Implementation (iterative per sprint) ───────────────
  - id: tech-task-resolution
    name: Task Resolution
    agent: implementer
    skills:
      - sdlc-tech-implementation
    inputs:
      - imp-001-implementation-plan.md
      - enb-000-index.md
      - stk-001-stack-conventions.md
    outputs:
      - current-task.md
    gate:
      criteria:
        - "Task prerequisites are verified as completed"
        - "Context resolution includes relevant upstream references"
        - "Task scope is bounded (≤ 8h estimated)"
      severity: blocker

  - id: tech-code-generation
    name: Code Generation
    agent: implementer
    skills:
      - sdlc-tech-implementation
    inputs:
      - current-task.md
      - stk-001-stack-conventions.md
      - dat-001-data-model.md
      - api-contracts/
      - adr/
    outputs:
      - implementation-log.md
    gate:
      criteria:
        - "Code compiles without errors"
        - "Generated code matches STK-001 naming conventions"
        - "Database migrations match DAT-001 definitions"
        - "API controllers match API-xxx contracts"
        - "No files modified outside task scope"
      severity: blocker

  - id: tech-test-implementation
    name: Test Implementation
    agent: implementer
    skills:
      - sdlc-tech-implementation
    inputs:
      - current-task.md
      - implementation-log.md
      - tst-001-test-strategy.md
      - api-contracts/
    outputs:
      - test-log.md
    gate:
      criteria:
        - "Every mapped TST-001 test ID has a corresponding test file"
        - "Tests pass"
        - "Each test has BA traceability comment"
        - "Test naming follows TST-001 conventions"
      severity: blocker

  - id: tech-validation
    name: Build & Validate
    agent: implementer
    skills:
      - sdlc-tech-implementation
    inputs:
      - implementation-log.md
      - test-log.md
    outputs:
      - validation-report.md
    gate:
      criteria:
        - "Full build passes"
        - "All tests pass"
        - "Coverage thresholds met"
        - "0 secrets detected"
        - "0 critical SAST findings"
      severity: blocker

  - id: tech-wave-gate
    name: Wave Gate
    agent: implementer
    skills:
      - sdlc-tech-implementation
    inputs:
      - imp-001-implementation-plan.md
      - validation-report.md
    outputs:
      - wave-report.md
    gate:
      criteria:
        - "All items in wave completed and validated"
        - "Wave DoD from IMP-001 met"
        - "No blocker issues pending"
      severity: blocker

  # ─── T4.1: Drift Detection (per wave, non-blocking) ─────────────────
  - id: tech-drift
    name: Drift Detection
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-quality
    inputs:
      - imp-001-implementation-plan.md
      - wave-report.md
    outputs:
      - drift-report.md
    gate:
      criteria:
        - "Spec-vs-code discrepancies identified"
      severity: warning

  # ─── T3.6: Push & CI Validation (per wave) ──────────────────────────
  - id: tech-push-ci
    name: Push & CI Validation
    agent: implementer
    skills:
      - sdlc-tech-implementation
    inputs:
      - wave-report.md
      - drift-report.md
    outputs:
      - ci-validation-report.md
    gate:
      criteria:
        - "Branch pushed to remote"
        - "CI pipeline passes"
      severity: blocker

  # ─── T3.7: Merge Request (per wave) ────────────────────────────────
  - id: tech-merge-request
    name: Merge Request
    agent: implementer
    skills:
      - sdlc-tech-implementation
    inputs:
      - ci-validation-report.md
    outputs:
      - merge-request-report.md
    gate:
      criteria:
        - "MR created and merged to main"
      severity: blocker

    loop:
      description: "T3 implementation loop: per-item stations repeat for each task in a wave. Per-wave stations (wave-gate, drift, push/CI, MR) fire after all items in the wave are completed. T4.2 code review runs per-wave. T4.3 E2E generation runs once after the last wave of each sprint."
      per_item: [tech-task-resolution, tech-code-generation, tech-test-implementation, tech-validation]
      per_wave: [tech-wave-gate, tech-drift, tech-push-ci, tech-merge-request, tech-code-review]
      per_sprint: [tech-e2e-gen]

  # ─── T4.2: Code Review (per wave) ──────────────────────────────────
  - id: tech-code-review
    name: Code Review
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-quality
    inputs:
      - wave-report.md
      - adr/
      - stk-001-stack-conventions.md
    outputs:
      - code-review-report.md
    gate:
      criteria:
        - "ADR compliance verified"
        - "Security practices and observability patterns checked"
      severity: warning

  # ─── T4.3: E2E Playwright Generation (per sprint) ──────────────────
  - id: tech-e2e-gen
    name: E2E Playwright Generation
    agent: sdlc-tech-architect
    skills:
      - sdlc-tech-quality
    inputs:
      - tst-001-test-strategy.md
      - e2e-plan-001.md
      - wave-report.md
    outputs:
      - e2e-scripts-001-playwright.md
    gate:
      criteria:
        - "E2E scripts trace to BA test scenarios"
        - "Testability filter applied: only flows with all US implemented"
      severity: warning

  # ─── Independent Review ────────────────────────────────────────────
  - id: tech-review
    name: Tech Independent Review
    agent: sdlc-tech-reviewer
    skills:
      - sdlc-deliverable-validation
      - sdlc-review-arbitration
    inputs:
      - imp-001-implementation-plan.md
    outputs:
      - tech-review-report.md
    required_outputs:
      - tech-review-report.md
    gate:
      criteria:
        - "All Tech deliverables independently reviewed"
        - "No CONFLICT verdicts, OR human has arbitrated all conflicts"
        - "BA-Tech traceability verified by independent reviewer"
        - "Status promotions issued for validated deliverables"
      severity: blocker
      on_conflict: pause

config:
  output_dir: outputs/docs/2-tech/
  state_file: workflow-state.md
  allow_resume: true
  allow_skip_gate: true
  nestable: true
