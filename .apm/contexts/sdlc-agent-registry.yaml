    client_inputs: "inputs/ba/3-design/{feature_id}/"
    tools:
      <<: *ba_tools_base
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output_pattern: "{feature_path}/notifications/"

  ba-3.5:
    name: Test Scenarios
    domain: BA
    system: S3
    min_depth: full
    skill: BA-Agents/skills/sk-3.5-test-scenarios.md
    refs:
      conventions: *ba_cv_base
      template: BA-Agents/refs/templates/tpl-test-scenario.md
      upstream_scope:
