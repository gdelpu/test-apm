      <<: *ba_hooks_std
    model: sonnet
    output_pattern: "{feature_path}/batches/"

  ba-3.4:
    name: Notifications
    domain: BA
    system: S3
    min_depth: full
    skill: BA-Agents/skills/sk-3.4-notifications.md
    refs:
      conventions: *ba_cv_base
