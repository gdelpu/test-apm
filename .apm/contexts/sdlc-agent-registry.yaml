# SDLC Agentic Harness — Agent Registry
# Each agent = skill + refs + tools + hooks
# Consumed by the coordinator (orchestration/coordinator.md).

# ─── Shared Definitions ──────────────────────────────────────────────

shared:

  ba_conventions_base: &ba_cv_base
    - BA-Agents/refs/conventions/cv-markdown.md
    - BA-Agents/refs/conventions/cv-domain-language.md
    - BA-Agents/refs/conventions/cv-output-language.md

  ba_conventions_brownfield: &ba_cv_brownfield
    - BA-Agents/refs/conventions/cv-markdown.md
    - BA-Agents/refs/conventions/cv-domain-language.md
    - BA-Agents/refs/conventions/cv-output-language.md
    - BA-Agents/refs/conventions/cv-brownfield.md

  ba_hooks_standard: &ba_hooks_std
    pre:
      - .apm/hooks/pre/input-validation/base.md
      - .apm/hooks/pre/input-validation/ba.md
    post:
      - .apm/hooks/post/quality-control.md
      - .apm/hooks/post/confluence-push.md

  ba_tools_base: &ba_tools_base
    required: [file-read, file-write]
    optional: [jira-mcp, context7-mcp]

  tech_conventions_base: &tech_cv_base
    - Tech-Agents/refs/conventions/cv-tech-markdown.md
    - Tech-Agents/refs/conventions/cv-ba-integration.md

  tech_hooks_standard: &tech_hooks_std
    pre:
      - .apm/hooks/pre/input-validation/base.md
      - .apm/hooks/pre/input-validation/tech.md
    post:
      - .apm/hooks/post/quality-control.md
      - .apm/hooks/post/confluence-push.md

  test_conventions_base: &test_cv_base
    - Test-Agents/refs/conventions/cv-test-conventions.md

  test_hooks_standard: &test_hooks_std
    pre:
      - .apm/hooks/pre/input-validation/base.md
      - .apm/hooks/pre/input-validation/test.md
    post:
      - .apm/hooks/post/quality-control.md
      - .apm/hooks/post/confluence-push.md

  steer_conventions_base: &steer_cv_base
    - Steer-Agents/refs/conventions/cv-pilotage-conventions.md
    - Steer-Agents/refs/conventions/cv-pilotage-agentique.md

  steer_hooks_standard: &steer_hooks_std
    pre:
      - .apm/hooks/pre/input-validation/base.md
      - .apm/hooks/pre/input-validation/steer.md
    post:
      - .apm/hooks/post/quality-control.md
      - .apm/hooks/post/confluence-push.md

# ─── BA Agents — System 0 (Audit) ───────────────────────────────────

agents:

  ba-0.1:
    name: Existing Audit
    domain: BA
    system: S0
    min_depth: essential
    skill: BA-Agents/skills/sk-0.1-existing-audit.md
    refs:
      conventions: *ba_cv_brownfield
      template: BA-Agents/refs/templates/tpl-existing-audit.md
      upstream: []
    client_inputs: inputs/ba/0-audit/
    tools:
      <<: *ba_tools_base
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output: outputs/docs/1-prd/0-audit/asis-001-existing-audit.md

  ba-0.2:
    name: Delta Analysis
    domain: BA
    system: S0
    min_depth: full
    skill: BA-Agents/skills/sk-0.2-delta-analysis.md
    refs:
      conventions: *ba_cv_brownfield
      template: BA-Agents/refs/templates/tpl-delta-analysis.md
      upstream:
        - outputs/docs/1-prd/0-audit/asis-001-existing-audit.md
    tools:
      <<: *ba_tools_base
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output: outputs/docs/1-prd/0-audit/delta-001-delta-analysis.md

  # ─── BA Agents — System 1 (Scoping) ─────────────────────────────────

  ba-1.1:
    name: Product Vision & Scope
    domain: BA
    system: S1
    min_depth: essential
    skill: BA-Agents/skills/sk-1.1-vision.md
    refs:
      conventions: *ba_cv_base
      template: BA-Agents/refs/templates/tpl-product-vision.md
      upstream:
        - outputs/docs/1-prd/1-scoping/dco-001-discovery.md
    client_inputs: inputs/ba/1-scoping/
    tools:
      <<: *ba_tools_base
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output: outputs/docs/1-prd/1-scoping/vis-001-product-vision.md

  ba-1.2:
    name: Business Glossary
    domain: BA
    system: S1
    min_depth: essential
    skill: BA-Agents/skills/sk-1.2-glossary.md
    refs:
      conventions: *ba_cv_base
      template: BA-Agents/refs/templates/tpl-glossary.md
      upstream:
        - outputs/docs/1-prd/1-scoping/dco-001-discovery.md
        - outputs/docs/1-prd/1-scoping/vis-001-product-vision.md
    client_inputs: inputs/ba/1-scoping/
    tools:
      <<: *ba_tools_base
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output: outputs/docs/1-prd/1-scoping/glo-001-glossary.md

  ba-1.3:
    name: Actors & Roles
    domain: BA
    system: S1
    min_depth: essential
    skill: BA-Agents/skills/sk-1.3-actors-roles.md
    refs:
      conventions: *ba_cv_base
      template: BA-Agents/refs/templates/tpl-actors-roles.md
      upstream:
        - outputs/docs/1-prd/1-scoping/dco-001-discovery.md
        - outputs/docs/1-prd/1-scoping/vis-001-product-vision.md
        - outputs/docs/1-prd/1-scoping/glo-001-glossary.md
    client_inputs: inputs/ba/1-scoping/
    tools:
      <<: *ba_tools_base
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output: outputs/docs/1-prd/1-scoping/act-001-actors-roles.md

  ba-1.4:
    name: Functional Requirements
    domain: BA
    system: S1
    min_depth: essential
    skill: BA-Agents/skills/sk-1.4-functional-requirements.md
    refs:
      conventions: *ba_cv_base
      template: BA-Agents/refs/templates/tpl-functional-requirements.md
      upstream:
        - outputs/docs/1-prd/1-scoping/vis-001-product-vision.md
        - outputs/docs/1-prd/1-scoping/glo-001-glossary.md
        - outputs/docs/1-prd/1-scoping/act-001-actors-roles.md
    client_inputs: inputs/ba/1-scoping/
    tools:
      required: [file-read, file-write]
      optional: [jira-mcp, r4j-api]
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output: outputs/docs/1-prd/1-scoping/exf-001-functional-requirements.md

  # ─── BA Agents — System 2 (Specification) ────────────────────────────

  ba-2.1:
    name: Domain Model
    domain: BA
    system: S2
    min_depth: essential
    skill: BA-Agents/skills/sk-2.1-domain-model.md
    refs:
      conventions: *ba_cv_base
      template: BA-Agents/refs/templates/tpl-domain-model.md
      upstream:
        - outputs/docs/1-prd/1-scoping/vis-001-product-vision.md
        - outputs/docs/1-prd/1-scoping/glo-001-glossary.md
        - outputs/docs/1-prd/1-scoping/act-001-actors-roles.md
        - outputs/docs/1-prd/0-audit/delta-001-delta-analysis.md
    client_inputs: inputs/ba/2-spec/
    tools:
      required: [file-read, file-write]
      optional: [jira-mcp, mermaid]
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output: outputs/docs/1-prd/2-specification/dom-001-domain-model.md
    secondary_output_pattern: "outputs/docs/1-prd/2-specification/_rules-staging/{rule_type}/rules-from-domain.md"
    rules_only: auto   # skip primary output if it already exists on disk

  ba-2.2:
    name: Epics
    domain: BA
    system: S2
    min_depth: essential
    skill: BA-Agents/skills/sk-2.2-epics.md
    refs:
      conventions: *ba_cv_base
      template: BA-Agents/refs/templates/tpl-epic.md
      upstream:
        - outputs/docs/1-prd/2-specification/dom-001-domain-model.md
        - outputs/docs/1-prd/1-scoping/exf-001-functional-requirements.md
        - outputs/docs/1-prd/1-scoping/vis-001-product-vision.md
    client_inputs: inputs/ba/2-spec/
    tools:
      <<: *ba_tools_base
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output_pattern: "outputs/docs/1-prd/3-epics/ep-{id}-{slug}/"
    secondary_output_pattern: "outputs/docs/1-prd/2-specification/_rules-staging/{rule_type}/rules-from-epics.md"
    rules_only: auto   # skip primary output if epics already exist on disk

  ba-2.2b:
    name: Feature Specifications
    domain: BA
    system: S2
    min_depth: essential
    skill: BA-Agents/skills/sk-2.2b-features.md
    refs:
      conventions: *ba_cv_base
      template: BA-Agents/refs/templates/tpl-feature.md
      template_variants:
        essential: BA-Agents/refs/templates/tpl-feature-essential.md
      upstream_pattern: "outputs/docs/1-prd/3-epics/{epic}/ep-*.md"
    tools:
      <<: *ba_tools_base
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output_pattern: "outputs/docs/1-prd/3-epics/{epic}/ft-{id}-{slug}/"
    secondary_output_pattern: "outputs/docs/1-prd/2-specification/_rules-staging/{rule_type}/rules-from-{epic-slug}.md"
    rules_only: auto   # skip primary output if features already exist on disk

  ba-2.3:
    name: Business Rules (Consolidation)
    domain: BA
    system: S2
    min_depth: full
    skill: BA-Agents/skills/sk-2.3-business-rules.md
    refs:
      conventions: *ba_cv_base
      template: BA-Agents/refs/templates/tpl-business-rules.md
      upstream:
        - "outputs/docs/1-prd/2-specification/_rules-staging/{rule_type}/"   # only files for this rule type
        - outputs/docs/1-prd/1-scoping/vis-001-product-vision.md
        - outputs/docs/1-prd/1-scoping/glo-001-glossary.md
        - outputs/docs/1-prd/1-scoping/act-001-actors-roles.md
    tools:
      <<: *ba_tools_base
    hooks:
      <<: *ba_hooks_std
    model: sonnet
    output_pattern: "outputs/docs/1-prd/2-specification/_rules-staging/{rule_type}/"

  ba-2.3b:
    name: Business Rules Dispatch & Confluence Push
    domain: BA
    system: S2
    min_depth: full
    script: "tools/dispatch-rules-to-features.sh"
    tools:
      required: [file-read, file-write]
      optional: [confluence-api]
    hooks:
      pre: []
      post:
        - .apm/hooks/post/confluence-push.md
    model: skip   # no LLM — script only
    output_pattern: "outputs/docs/1-prd/3-epics/{epic}/{feature}/business-rules.md"
    confluence_push: "outputs/docs/1-prd/3-epics/*/ft-*/business-rules.md"

  # ─── BA Agents — System 3 (Design) — per feature ────────────────────

  ba-3.1:
    name: User Stories
    domain: BA
    system: S3
    min_depth: essential
    skill: BA-Agents/skills/sk-3.1-user-stories.md
