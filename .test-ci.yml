# .gitlab-ci.yml
stages: [ai-checks]

ai:copilot-cli:
  stage: ai-checks
  image: node:18-bullseye
  variables:
    # Make sure you add COPILOT_AUTH_TOKEN in GitLab → Settings → CI/CD → Variables
    COPILOT_AUTH_TOKEN: $COPILOT_AUTH_TOKEN
    # Optional: keep outputs reproducible and quiet
    CI: "true"
  before_script:
    - npm -g i @github/copilot@latest
    # Non-interactive authentication for CI: the CLI supports using env auth tokens.
    # The InventiveHQ guide covers token scopes and storage in GitLab variables.
    # (No interactive /login in CI.)
  script:
    # 1) run a one-shot analysis against the current repo
    - |
      copilot --one-shot "
      You are a strict security reviewer. Scan the repo for risky patterns (secrets, unsafe eval, SQL injection).
      Output JSON with fields: risks[], severity_by_file{}.
      " --cwd .
    # 2) or run a custom agent by name (if you commit .agent.md files)
    - copilot --one-shot "/agent SecurityReviewer Analyze the diff in this commit and summarize 3 top risks"
    # 3) or delegate async work to the coding agent (opens draft PR in GitHub)
    # - copilot --one-shot "/delegate Refactor logging to use structured JSON logs and add tests"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
