name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths: ['frontend/**']
  pull_request:
    branches: [ main, develop ]
    paths: ['frontend/**']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run linting
      working-directory: ./frontend
      run: npm run lint

    - name: Run unit tests
      working-directory: ./frontend
      run: npm run test:ci

    - name: Build application
      working-directory: ./frontend
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build-${{ matrix.node-version }}
        path: frontend/dist/

  e2e-tests:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Install Playwright browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Start backend services
      working-directory: ./backend
      run: |
        dotnet restore
        dotnet run --project src/AppHost &
        sleep 30  # Wait for services to start
      env:
        ASPNETCORE_ENVIRONMENT: Development

    - name: Run E2E tests
      working-directory: ./frontend
      run: npm run test:e2e
      env:
        CI: true

    - name: Run accessibility tests
      working-directory: ./frontend
      run: npm run test:accessibility
      env:
        CI: true

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run npm audit
      working-directory: ./frontend
      run: npm audit --audit-level moderate

    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@4.0.0
      with:
        project: 'agoria-xytool-frontend'
        path: './frontend'
        format: 'ALL'
        args: >
          --enableRetired
          --enableExperimental
          --suppression ./frontend/dependency_check_suppressions.xml

    - name: Upload OWASP results
      uses: actions/upload-artifact@v4
      with:
        name: owasp-dependency-check-report
        path: reports/

  quality-gates:
    needs: [test, e2e-tests, security-scan]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check all jobs status
      run: |
        if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.e2e-tests.result }}" == "failure" || "${{ needs.security-scan.result }}" == "failure" ]]; then
          echo "❌ Quality gates failed"
          echo "- Unit Tests: ${{ needs.test.result }}"
          echo "- E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "- Security Scan: ${{ needs.security-scan.result }}"
          exit 1
        else
          echo "✅ All quality gates passed"
          echo "- Unit Tests: ${{ needs.test.result }}"
          echo "- E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "- Security Scan: ${{ needs.security-scan.result }}"
        fi
