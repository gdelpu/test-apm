name: Agent Factory — Station Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/agents/**"
      - "**/skills/**"
      - "**/prompts/**"
      - "**/instructions/**"
      - "station-workflows/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: agent-factory-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  STATION_OUT: station_out
  PYTHON_VERSION: "3.12"

# ─────────────────────────────────────────────────────────────────────────────
# A0 — INTAKE
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  A0-intake:
    name: "A0 · Intake"
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.intake.outputs.scope }}
      risk_hints: ${{ steps.intake.outputs.risk_hints }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create station_out/
        run: mkdir -p ${{ env.STATION_OUT }}

      - name: Run A0 Intake
        id: intake
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import json, os, re, subprocess, sys
          from datetime import datetime, timezone

          pr_number = int(os.environ["PR_NUMBER"])
          diff = subprocess.check_output(["git", "diff", "origin/${{ github.event.pull_request.base.ref }}...HEAD", "--name-status"], text=True)
          diff_content = subprocess.check_output(["git", "diff", "origin/${{ github.event.pull_request.base.ref }}...HEAD"], text=True)

          AGENT_TYPES = {
              r"agents/.*\.agent\.md$": "agent",
              r"skills/.*/SKILL\.md$": "skill",
              r"prompts/.*\.prompt\.md$": "prompt",
              r"instructions/.*\.instructions\.md$": "instruction",
              r"\.github/workflows/.*\.ya?ml$": "workflow",
          }

          changed_files = []
          for line in diff.splitlines():
              parts = line.split("\t", 1)
              if len(parts) < 2:
                  continue
              status_code, path = parts[0][0], parts[-1]
              change = {"A": "added", "M": "modified", "D": "deleted"}.get(status_code, "modified")
              artefact_type = next((t for pat, t in AGENT_TYPES.items() if re.search(pat, path)), "other")
              changed_files.append({"path": path, "type": artefact_type, "change": change})

          RISK_PATTERNS = [
              (r"runCommands", "exec-tool"),
              (r"allowedNetworkDomains:\s*[\n\r]\s*-\s*\"\*\"", "unconstrained-network"),
              (r"allowedFilePaths:\s*[\n\r]\s*-\s*\"\*\*\"", "unconstrained-files"),
              (r"(curl|wget|bash|sh)\s+.*\|", "shell-pipe"),
              (r"eval\s*\(", "eval-usage"),
          ]

          risk_hints = list({hint for pat, hint in RISK_PATTERNS if re.search(pat, diff_content)})

          agent_skill_types = {"agent", "skill", "prompt", "instruction"}
          has_agent_change = any(f["type"] in agent_skill_types for f in changed_files)
          scope = "agent-change" if has_agent_change else "non-agent"

          work_order = {
              "station": "A0",
              "pr_number": pr_number,
              "pr_title": os.environ["PR_TITLE"],
              "author": os.environ["PR_AUTHOR"],
              "base_branch": os.environ["PR_BASE"],
              "head_branch": os.environ["PR_HEAD"],
              "created_at": datetime.now(timezone.utc).isoformat(),
              "scope": scope,
              "changed_files": changed_files,
              "risk_hints": risk_hints,
              "diff_summary": diff_content[:500] + ("…" if len(diff_content) > 500 else ""),
          }

          with open("${{ env.STATION_OUT }}/work_order.json", "w") as f:
              json.dump(work_order, f, indent=2)

          print(f"scope={scope}", file=open(os.environ["GITHUB_OUTPUT"], "a"))
          print(f"risk_hints={json.dumps(risk_hints)}", file=open(os.environ["GITHUB_OUTPUT"], "a"))
          print(f"✅ A0 complete — scope={scope}, risk_hints={risk_hints}")
          EOF

      - name: Upload station_out
        uses: actions/upload-artifact@v4
        with:
          name: station-out-A0
          path: ${{ env.STATION_OUT }}/

# ─────────────────────────────────────────────────────────────────────────────
# A1 — POLICY & STRUCTURE VALIDATION
# ─────────────────────────────────────────────────────────────────────────────
  A1-policy-validation:
    name: "A1 · Policy & Structure Validation"
    needs: A0-intake
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.validate.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download A0 artifacts
        uses: actions/download-artifact@v4
        with:
          name: station-out-A0
          path: ${{ env.STATION_OUT }}

      - name: Install jsonschema
        run: pip install jsonschema pyyaml --quiet

      - name: Run A1 Policy Validation
        id: validate
        run: |
          python - <<'EOF'
          import json, yaml, re, sys
          from pathlib import Path
          import jsonschema

          work_order = json.loads(Path("${{ env.STATION_OUT }}/work_order.json").read_text())

          if work_order["scope"] == "non-agent":
              report = {"station": "A1", "status": "skipped", "findings": [], "summary": "No agent/skill files changed."}
              Path("${{ env.STATION_OUT }}/policy_report.json").write_text(json.dumps(report, indent=2))
              print("status=skipped", file=open("$GITHUB_OUTPUT", "a"))
              sys.exit(0)

          TOOL_ALLOWLIST = {"codebase","search","edit/editFiles","problems","runCommands","github","terminal","fetch","vscode"}
          findings = []

          for file_entry in work_order["changed_files"]:
              if file_entry["type"] not in ("agent", "skill") or file_entry["change"] == "deleted":
                  continue
              path = Path(file_entry["path"])
              if not path.exists():
                  continue
              text = path.read_text()
              fm_match = re.match(r"^---\n(.*?)\n---", text, re.DOTALL)
              if not fm_match:
                  findings.append({"rule":"P-01","severity":"critical","file":str(path),"message":"Missing YAML frontmatter","line":1})
                  continue
              fm = yaml.safe_load(fm_match.group(1)) or {}

              # P-01 required fields
              required = ["name","description","tools"] if file_entry["type"]=="agent" else ["name","description","triggers"]
              for field in required:
                  if not fm.get(field):
                      findings.append({"rule":"P-01","severity":"critical","file":str(path),"message":f"Missing required field: {field}","line":None})

              # P-02 tool allowlist
              for tool in fm.get("tools", []):
                  if tool not in TOOL_ALLOWLIST:
                      findings.append({"rule":"P-02","severity":"critical","file":str(path),"message":f"Unknown tool: {tool}","line":None})

              # P-03 runCommands without commandAllowlist
              if "runCommands" in fm.get("tools",[]) and not fm.get("commandAllowlist"):
                  findings.append({"rule":"P-03","severity":"critical","file":str(path),"message":"runCommands declared without commandAllowlist","line":None})

              # P-04 fetch without allowedNetworkDomains
              if "fetch" in fm.get("tools",[]):
                  domains = fm.get("allowedNetworkDomains",[])
                  if not domains or "*" in domains:
                      findings.append({"rule":"P-04","severity":"high","file":str(path),"message":"fetch tool requires non-wildcard allowedNetworkDomains","line":None})

              # P-05 description length
              if len(fm.get("description","")) < 20:
                  findings.append({"rule":"P-05","severity":"low","file":str(path),"message":f"Description is too short ({len(fm.get('description',''))} chars, min 20)","line":None})

          counts = {s: sum(1 for f in findings if f["severity"]==s) for s in ("critical","high","medium","low")}
          status = "fail" if counts["critical"] or counts["high"] else "pass"
          report = {"station":"A1","status":status,"findings":findings,"summary":f"{counts['critical']} critical, {counts['high']} high, {counts['medium']} medium, {counts['low']} low"}
          Path("${{ env.STATION_OUT }}/policy_report.json").write_text(json.dumps(report, indent=2))
          print(f"status={status}", file=open("$GITHUB_OUTPUT","a"))
          print(f"{'❌' if status=='fail' else '✅'} A1 {status} — {report['summary']}")
          EOF

      - name: Upload station_out
        uses: actions/upload-artifact@v4
        with:
          name: station-out-A1
          path: ${{ env.STATION_OUT }}/

# ─────────────────────────────────────────────────────────────────────────────
# A2 — SECURITY STATIC CHECKS
# ─────────────────────────────────────────────────────────────────────────────
  A2-security-static:
    name: "A2 · Security Static Checks"
    needs: A1-policy-validation
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.scan.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: station-out-A1
          path: ${{ env.STATION_OUT }}

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Run A2 Security Checks
        id: scan
        run: |
          python - <<'EOF'
          import json, re, subprocess, sys
          from pathlib import Path

          work_order = json.loads(Path("${{ env.STATION_OUT }}/work_order.json").read_text())

          if work_order["scope"] == "non-agent":
              report = {"station":"A2","status":"skipped","findings":[],"dependency_scan_ran":False,"secret_scan_ran":False,"summary":"No agent/skill files changed."}
              Path("${{ env.STATION_OUT }}/security_report.json").write_text(json.dumps(report, indent=2))
              print("status=skipped", file=open("$GITHUB_OUTPUT","a"))
              sys.exit(0)

          findings = []

          # S-01 Secret scan via Gitleaks
          result = subprocess.run(
              ["gitleaks", "detect", "--source", ".", "--report-format", "json", "--report-path", "/tmp/gitleaks.json", "--no-banner"],
              capture_output=True, text=True
          )
          secret_scan_ran = True
          if Path("/tmp/gitleaks.json").exists():
              leaks = json.loads(Path("/tmp/gitleaks.json").read_text() or "[]")
              for leak in leaks:
                  findings.append({"check":"S-01","severity":"critical","file":leak.get("File",""),"line":leak.get("StartLine"),"match":"[REDACTED]","message":f"Secret detected: {leak.get('Description','potential secret')}"})

          # S-02 Dependency scan via Trivy (if lock files changed)
          dep_files = [f["path"] for f in work_order["changed_files"] if Path(f["path"]).name in ("package-lock.json","requirements.txt","pyproject.toml","go.sum","Gemfile.lock","pom.xml")]
          dep_scan_ran = bool(dep_files)
          for dep_file in dep_files:
              trivy_result = subprocess.run(
                  ["trivy", "fs", "--format", "json", "--quiet", dep_file],
                  capture_output=True, text=True
              )
              if trivy_result.stdout:
                  trivy_data = json.loads(trivy_result.stdout)
                  for res in trivy_data.get("Results", []):
                      for vuln in res.get("Vulnerabilities", []):
                          cvss = vuln.get("CVSS",{}).get("nvd",{}).get("V3Score", 0) or 0
                          sev = "critical" if cvss>=9 else "high" if cvss>=7 else "medium" if cvss>=4 else "low"
                          findings.append({"check":"S-02","severity":sev,"file":dep_file,"line":None,"match":f"{vuln.get('PkgName')}@{vuln.get('InstalledVersion')}","message":f"{vuln.get('VulnerabilityID')}: {vuln.get('Title','')}"})

          # S-03 Dangerous pattern scan
          PATTERNS = [
              ("S-03-A", r"curl\s+.*\|\s*(bash|sh)",            "critical", "Piping curl to shell"),
              ("S-03-B", r"wget\s+.*\|\s*(bash|sh)",            "critical", "Piping wget to shell"),
              ("S-03-C", r"\beval\s*\(",                         "high",     "Use of eval()"),
              ("S-03-D", r"subprocess\.call\(.*shell=True",      "high",     "subprocess shell=True"),
              ("S-03-E", r"\bos\.system\(",                      "high",     "os.system() call"),
              ("S-03-F", r'"allowedFilePaths".*\*\*',            "high",     "Wildcard file path"),
              ("S-03-G", r"rm\s+-rf\s+/",                        "critical", "Recursive delete from root"),
              ("S-03-H", r"chmod\s+777",                         "medium",   "World-writable permissions"),
          ]
          diff = subprocess.check_output(["git","diff","origin/${{ github.event.pull_request.base.ref }}...HEAD"], text=True)
          for check_id, pattern, severity, desc in PATTERNS:
              for i, line in enumerate(diff.splitlines(), 1):
                  if line.startswith("+") and re.search(pattern, line):
                      findings.append({"check":check_id,"severity":severity,"file":"(diff)","line":i,"match":line[:120],"message":desc})

          counts = {s: sum(1 for f in findings if f["severity"]==s) for s in ("critical","high","medium","low")}
          status = "fail" if counts["critical"] or counts["high"] else "pass"
          report = {"station":"A2","status":status,"findings":findings,"dependency_scan_ran":dep_scan_ran,"secret_scan_ran":secret_scan_ran,"summary":f"{counts['critical']} critical, {counts['high']} high, {counts['medium']} medium, {counts['low']} low"}
          Path("${{ env.STATION_OUT }}/security_report.json").write_text(json.dumps(report, indent=2))
          print(f"status={status}", file=open("$GITHUB_OUTPUT","a"))
          print(f"{'❌' if status=='fail' else '✅'} A2 {status} — {report['summary']}")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: station-out-A2
          path: ${{ env.STATION_OUT }}/

# ─────────────────────────────────────────────────────────────────────────────
# A3 — PROMPT INJECTION & EXFIL HARDENING
# ─────────────────────────────────────────────────────────────────────────────
  A3-prompt-injection:
    name: "A3 · Prompt Injection & Exfil Hardening"
    needs: A2-security-static
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.promptsec.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: station-out-A2
          path: ${{ env.STATION_OUT }}

      - name: Run A3 Prompt Injection Checks
        id: promptsec
        run: |
          python - <<'EOF'
          import json, re, sys, yaml
          from pathlib import Path

          work_order = json.loads(Path("${{ env.STATION_OUT }}/work_order.json").read_text())

          if work_order["scope"] == "non-agent":
              report = {"station":"A3","status":"skipped","red_team_ran":False,"findings":[],"summary":"No agent/skill files changed."}
              Path("${{ env.STATION_OUT }}/promptsec_report.json").write_text(json.dumps(report, indent=2))
              print("status=skipped", file=open("$GITHUB_OUTPUT","a"))
              sys.exit(0)

          PI01_PATTERNS = [
              (r"ignore\s+(all|previous|above|prior)\s+instructions?",  "critical", "Instruction-override phrase"),
              (r"disregard\s+(your|all)\s+(previous|prior)",            "critical", "Instruction-override variant"),
              (r"you\s+(are|were)\s+now\s+(a|an)\s+",                   "high",     "Role reassignment"),
              (r"pretend\s+(you\s+are|to\s+be)",                        "high",     "Persona hijack"),
              (r"\bDAN\b|do\s+anything\s+now",                          "high",     "DAN jailbreak"),
              (r"your\s+(new|real|true)\s+instructions",                 "high",     "System prompt override"),
              (r"developer\s+mode",                                      "high",     "Developer-mode jailbreak"),
              (r"\[SYSTEM\]|\[INST\]",                                   "critical", "Injected system-role delimiter"),
          ]
          PI05_PATTERN = re.compile(r"https?://[^\s\"']+\$\{[^}]+\}")
          PI06_PATTERN = re.compile(r"(read|process|execute|follow).{0,40}(file|document|webpage|url).{0,40}(instruct|step|direct)", re.I)
          REFUSAL_ANCHORS = re.compile(r"(must\s+not|will\s+not|never).{0,30}(delete|modify|send|exfiltrate|bypass)|(refuse).{0,20}(request|instruction|attempt)|out\s+of\s+scope", re.I)

          findings = []
          for file_entry in work_order["changed_files"]:
              if file_entry["type"] not in ("agent","skill","prompt") or file_entry["change"]=="deleted":
                  continue
              path = Path(file_entry["path"])
              if not path.exists():
                  continue
              text = path.read_text()
              lines = text.splitlines()

              # PI-01 jailbreak phrases
              for i, line in enumerate(lines, 1):
                  for pat, sev, desc in PI01_PATTERNS:
                      if re.search(pat, line, re.I):
                          findings.append({"check":"PI-01","severity":sev,"file":str(path),"line":i,"match":line[:120],"message":desc})

              # PI-02 required refusal anchors (agents only)
              if file_entry["type"] == "agent" and not REFUSAL_ANCHORS.search(text):
                  findings.append({"check":"PI-02","severity":"high","file":str(path),"line":None,"match":None,"message":"Agent body contains no non-negotiable refusal constraints."})

              # PI-05 exfiltration via dynamic URLs
              for i, line in enumerate(lines, 1):
                  if PI05_PATTERN.search(line):
                      findings.append({"check":"PI-05","severity":"high","file":str(path),"line":i,"match":line[:120],"message":"Dynamic URL construction with user input — potential exfiltration vector."})

              # PI-06 indirect injection
              for i, line in enumerate(lines, 1):
                  if PI06_PATTERN.search(line):
                      findings.append({"check":"PI-06","severity":"critical","file":str(path),"line":i,"match":line[:120],"message":"Instruction to process external content without sandboxing detected."})

          counts = {s: sum(1 for f in findings if f["severity"]==s) for s in ("critical","high","medium","low")}
          status = "fail" if counts["critical"] or counts["high"] else "pass"
          report = {"station":"A3","status":status,"red_team_ran":False,"findings":findings,"summary":f"{counts['critical']} critical, {counts['high']} high, {counts['medium']} medium, {counts['low']} low"}
          Path("${{ env.STATION_OUT }}/promptsec_report.json").write_text(json.dumps(report, indent=2))
          print(f"status={status}", file=open("$GITHUB_OUTPUT","a"))
          print(f"{'❌' if status=='fail' else '✅'} A3 {status} — {report['summary']}")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: station-out-A3
          path: ${{ env.STATION_OUT }}/

# ─────────────────────────────────────────────────────────────────────────────
# A4 — SANDBOX SIMULATION
# ─────────────────────────────────────────────────────────────────────────────
  A4-sandbox-simulation:
    name: "A4 · Sandbox Simulation"
    needs: A3-prompt-injection
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.simulate.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: station-out-A3
          path: ${{ env.STATION_OUT }}

      - name: Run A4 Sandbox Simulation
        id: simulate
        run: |
          python - <<'EOF'
          import json, re, sys, yaml
          from pathlib import Path

          work_order    = json.loads(Path("${{ env.STATION_OUT }}/work_order.json").read_text())
          fixtures_dir  = Path("station-workflows/fixtures")
          mal_inputs    = json.loads((fixtures_dir / "malicious-inputs.json").read_text())
          inj_payloads  = json.loads((fixtures_dir / "prompt-injection-payloads.json").read_text())

          agent_files = [f for f in work_order["changed_files"] if f["type"]=="agent" and f["change"]!="deleted"]
          if not agent_files:
              report = {"station":"A4","status":"skipped","findings":[],"summary":"No agent files to simulate."}
              Path("${{ env.STATION_OUT }}/sim_report.json").write_text(json.dumps(report, indent=2))
              print("status=skipped", file=open("$GITHUB_OUTPUT","a"))
              sys.exit(0)

          def load_agent(path):
              text = Path(path).read_text()
              fm_match = re.match(r"^```chatagent\n---\n(.*?)\n---", text, re.DOTALL)
              if not fm_match:
                  fm_match = re.match(r"^---\n(.*?)\n---", text, re.DOTALL)
              fm = yaml.safe_load(fm_match.group(1)) if fm_match else {}
              return fm, text

          REFUSAL = re.compile(r"(must\s+not|will\s+not|never|refuse|do\s+not|only\s+read-only)", re.I)
          NO_GITHUB_PATHS = re.compile(r"\.github", re.I)

          scenarios = []
          findings = []
          for file_entry in agent_files:
              fm, text = load_agent(file_entry["path"])
              tools = fm.get("tools", [])
              allowed_paths = fm.get("allowedFilePaths", [])
              allowed_domains = fm.get("allowedNetworkDomains", [])

              # 4-A Exfiltration
              exfil_resistant = "fetch" not in tools or (allowed_domains and "*" not in allowed_domains)
              scenarios.append({"id":"4-A","name":"Data Exfiltration","result":"resistant" if exfil_resistant else "vulnerable","evidence":f"fetch in tools={('fetch' in tools)}, allowedNetworkDomains={allowed_domains}","severity":None if exfil_resistant else "critical"})

              # 4-B Prompt injection
              has_refusal = bool(REFUSAL.search(text))
              scenarios.append({"id":"4-B","name":"Prompt Injection","result":"resistant" if has_refusal else "partial","evidence":"Refusal anchor found." if has_refusal else "No explicit refusal constraints in agent body.","severity":None if has_refusal else "high"})

              # 4-C CI pipeline modification
              can_edit = "edit/editFiles" in tools or "runCommands" in tools
              blocks_ci = can_edit and any(re.search(r"\.github", p) is None for p in allowed_paths) if allowed_paths else not can_edit
              ci_vulnerable = can_edit and not allowed_paths and not NO_GITHUB_PATHS.search(text)
              scenarios.append({"id":"4-C","name":"CI Pipeline Modification","result":"vulnerable" if ci_vulnerable else "resistant","evidence":f"edit/runCommands={can_edit}, allowedFilePaths={allowed_paths}","severity":"critical" if ci_vulnerable else None})

              # 4-D Secret extraction
              can_read = "codebase" in tools or "edit/editFiles" in tools
              no_secret_guard = not re.search(r"(\.env|credential|secret|password|api.?key)", text, re.I)
              secret_vulnerable = can_read and no_secret_guard
              scenarios.append({"id":"4-D","name":"Secret Extraction","result":"vulnerable" if secret_vulnerable else "resistant","evidence":"No guard against reading secret files." if secret_vulnerable else "Instructions reference credential restrictions.","severity":"critical" if secret_vulnerable else None})

              # 4-E Privilege escalation via chaining
              chain_possible = "fetch" in tools and "runCommands" in tools
              chain_blocked = allowed_domains and allowed_paths and fm.get("commandAllowlist")
              scenarios.append({"id":"4-E","name":"Privilege Escalation via Chain","result":"vulnerable" if (chain_possible and not chain_blocked) else "resistant","evidence":f"fetch+runCommands={chain_possible}, constraints complete={chain_blocked}","severity":"critical" if (chain_possible and not chain_blocked) else None})

              # 4-F Resource exhaustion
              has_depth_guard = bool(re.search(r"(recursion|depth|limit|rate.?limit|token.?limit|max\s+\d+)", text, re.I))
              scenarios.append({"id":"4-F","name":"Resource Exhaustion","result":"resistant" if has_depth_guard else "partial","evidence":"Recursion/depth guard found." if has_depth_guard else "No explicit depth or rate limit in agent instructions.","severity":None})

              for s in scenarios:
                  if s["severity"]:
                      findings.append({"scenario":s["id"],"severity":s["severity"],"file":file_entry["path"],"message":f"Scenario {s['id']} ({s['name']}): {s['evidence']}"})

          counts = {s: sum(1 for f in findings if f["severity"]==s) for s in ("critical","high","medium","low")}
          status = "fail" if counts["critical"] or counts["high"] else "pass"
          report = {"station":"A4","status":status,"target_agent":agent_files[0]["path"] if agent_files else None,"scenarios":scenarios,"findings":findings,"summary":f"{counts['critical']} critical ({sum(1 for s in scenarios if s['result']=='vulnerable')} vulnerable), {sum(1 for s in scenarios if s['result']=='resistant')} resistant"}
          Path("${{ env.STATION_OUT }}/sim_report.json").write_text(json.dumps(report, indent=2))
          print(f"status={status}", file=open("$GITHUB_OUTPUT","a"))
          print(f"{'❌' if status=='fail' else '✅'} A4 {status} — {report['summary']}")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: station-out-A4
          path: ${{ env.STATION_OUT }}/

# ─────────────────────────────────────────────────────────────────────────────
# A5 — POLICY GATE
# ─────────────────────────────────────────────────────────────────────────────
  A5-policy-gate:
    name: "A5 · Policy Gate"
    needs: A4-sandbox-simulation
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.gate.outputs.decision }}
      labels: ${{ steps.gate.outputs.labels }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: station-out-A4
          path: ${{ env.STATION_OUT }}

      - name: Run A5 Policy Gate
        id: gate
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          STATION_OUT = Path("${{ env.STATION_OUT }}")

          work_order    = json.loads((STATION_OUT / "work_order.json").read_text())
          policy        = json.loads((STATION_OUT / "policy_report.json").read_text())
          security      = json.loads((STATION_OUT / "security_report.json").read_text())
          promptsec     = json.loads((STATION_OUT / "promptsec_report.json").read_text())
          sim           = json.loads((STATION_OUT / "sim_report.json").read_text())

          all_reports   = [policy, security, promptsec, sim]
          all_findings  = [f for r in all_reports for f in r.get("findings", [])]
          failed        = [r["station"] for r in all_reports if r.get("status") == "fail"]
          skipped       = [r["station"] for r in all_reports if r.get("status") == "skipped"]

          has_critical  = any(f.get("severity") == "critical" for f in all_findings)
          has_high      = any(f.get("severity") == "high"     for f in all_findings)
          risk_hints    = work_order.get("risk_hints", [])
          high_risk_hints = {"exec-tool","unconstrained-network","unconstrained-files"}

          # Determine decision
          if failed or has_critical:
              decision = "BLOCK"
          elif has_high or bool(high_risk_hints & set(risk_hints)):
              decision = "REVIEW"
          else:
              if work_order["scope"] == "non-agent":
                  decision = "APPROVE"
              else:
                  decision = "APPROVE"

          # Labels
          base_labels = ["agent-factory:scanned"]
          if decision == "BLOCK":
              labels = base_labels + ["security:blocker","agent-factory:blocked"]
          elif decision == "REVIEW":
              labels = base_labels + ["agent-factory:needs-review"]
              if "exec-tool"               in risk_hints: labels.append("agent:exec-tool")
              if "unconstrained-network"   in risk_hints: labels.append("agent:network-access")
              if has_high:                               labels.append("agent:risk-high")
          else:
              labels = base_labels + ["agent-factory:approved"]

          blocking  = [f for f in all_findings if f.get("severity") in ("critical",)]
          review_f  = [f for f in all_findings if f.get("severity") == "high"]
          warnings  = [f for f in all_findings if f.get("severity") in ("medium","low")]
          summary   = f"PR {decision} — {len(blocking)} critical finding(s), {len(review_f)} high finding(s)."

          gate_decision = {
              "station": "A5",
              "decision": decision,
              "labels": labels,
              "blocking_findings": blocking,
              "review_findings": review_f,
              "warnings": warnings,
              "notes": f"Skipped stations: {skipped}. Failed stations: {failed}.",
              "summary": summary,
          }
          (STATION_OUT / "gate_decision.json").write_text(json.dumps(gate_decision, indent=2))
          print(f"decision={decision}", file=open("$GITHUB_OUTPUT","a"))
          print(f"labels={json.dumps(labels)}", file=open("$GITHUB_OUTPUT","a"))
          icon = "✅" if decision=="APPROVE" else "❌" if decision=="BLOCK" else "⚠️"
          print(f"{icon} A5 Gate decision: {decision} — {summary}")
          if decision == "BLOCK":
              sys.exit(1)
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: station-out-A5
          path: ${{ env.STATION_OUT }}/

# ─────────────────────────────────────────────────────────────────────────────
# A6 — GITHUB UPDATE
# ─────────────────────────────────────────────────────────────────────────────
  A6-github-update:
    name: "A6 · GitHub Update"
    needs: A5-policy-gate
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: station-out-A5
          path: ${{ env.STATION_OUT }}

      - name: Apply labels
        run: |
          LABELS=$(python -c "
          import json
          from pathlib import Path
          d = json.loads(Path('${{ env.STATION_OUT }}/gate_decision.json').read_text())
          print(','.join(d['labels']))
          ")
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$LABELS" || true

      - name: Request review (REVIEW decision)
        if: needs.A5-policy-gate.outputs.decision == 'REVIEW'
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-reviewer "${{ github.repository_owner }}/agent-security-approvers" || true

      - name: Post PR comment
        run: |
          python - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path

          STATION_OUT = Path("${{ env.STATION_OUT }}")
          work_order   = json.loads((STATION_OUT / "work_order.json").read_text())
          gate         = json.loads((STATION_OUT / "gate_decision.json").read_text())
          policy       = json.loads((STATION_OUT / "policy_report.json").read_text())
          security     = json.loads((STATION_OUT / "security_report.json").read_text())
          promptsec    = json.loads((STATION_OUT / "promptsec_report.json").read_text())
          sim          = json.loads((STATION_OUT / "sim_report.json").read_text())

          STATUS_BADGE = {"pass":"✅ pass","fail":"❌ fail","skipped":"⏭ skipped"}
          DECISION_BADGE = {
              "APPROVE": "✅ **APPROVED** — safe to merge",
              "BLOCK":   "❌ **BLOCKED** — critical issues must be resolved",
              "REVIEW":  "⚠️ **NEEDS REVIEW** — human approval required",
          }

          def findings_table(findings, caption):
              if not findings:
                  return f"_{caption}_"
              rows = "\n".join(f"| {f.get('station','?')} | {f.get('check',f.get('rule','?'))} | 🔴 {f['severity']} | `{f.get('file','')}` | {f.get('message','')} |" for f in findings)
              return f"| Station | Check | Severity | File | Message |\n|---------|-------|----------|------|---------|  \n{rows}"

          blocking_table = findings_table(gate["blocking_findings"], "No blocking findings.")
          review_table   = findings_table(gate.get("review_findings",[]), "No review findings.")
          warn_table     = findings_table(gate.get("warnings",[]), "No warnings.")

          comment = f"""<!-- agent-factory-report -->
          ## 🏭 Agent Factory Report

          **Decision**: {DECISION_BADGE[gate['decision']]}
          **PR**: {work_order['pr_title']} by @{work_order['author']}
          **Risk hints**: {', '.join(f'`{h}`' for h in work_order.get('risk_hints',[])) or '_none_'}

          ---

          ### Station Summary

          | Station | Status | Findings |
          |---------|--------|----------|
          | A0 Intake | ✅ pass | — |
          | A1 Policy & Structure | {STATUS_BADGE.get(policy['status'],'?')} | {policy.get('summary','')} |
          | A2 Security Static | {STATUS_BADGE.get(security['status'],'?')} | {security.get('summary','')} |
          | A3 Prompt Injection | {STATUS_BADGE.get(promptsec['status'],'?')} | {promptsec.get('summary','')} |
          | A4 Sandbox Simulation | {STATUS_BADGE.get(sim['status'],'?')} | {sim.get('summary','')} |

          ---

          ### ❌ Blocking Findings

          {blocking_table}

          ### ⚠️ Review Findings

          {review_table}

          ---

          ### Informational & Warnings

          {warn_table}

          ---

          <details>
          <summary>Report artifacts (uploaded to this workflow run)</summary>

          - `station_out/work_order.json`
          - `station_out/policy_report.json`
          - `station_out/security_report.json`
          - `station_out/promptsec_report.json`
          - `station_out/sim_report.json`
          - `station_out/gate_decision.json`

          </details>
          """

          # Delete any prior agent-factory comment
          pr_number = work_order["pr_number"]
          comments = json.loads(subprocess.check_output(
              ["gh","api",f"repos/${{{{ github.repository }}}}/issues/{pr_number}/comments","--paginate"],
              text=True
          ))
          for c in comments:
              if "<!-- agent-factory-report -->" in c.get("body",""):
                  subprocess.run(["gh","api","-X","DELETE",f"repos/${{{{ github.repository }}}}/issues/comments/{c['id']}"])

          subprocess.run(
              ["gh","pr","comment",str(pr_number),"--body",comment],
              check=True
          )
          print("✅ A6 PR comment posted.")
          PYEOF
