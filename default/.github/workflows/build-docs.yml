name: Build brand docs
on:
  push:
    paths: ["default/skills/brand-styler/**", "default/.github/workflows/build-docs.yml"]
  pull_request:
    paths: ["default/skills/brand-styler/**", "default/.github/workflows/build-docs.yml"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: build-brand-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc & TeX (XeLaTeX)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Setup Python (for DOCX template)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-docx

      - name: Ensure reference.docx
        run: python default/skills/brand-styler/tools/scripts/brandify-docx.py

      - name: Build DOCX & PDF from Markdown
        run: |
          set -euo pipefail
          mkdir -p build
          for f in default/skills/brand-styler/docs/*.md; do
            base=$(basename "$f" .md)
            pandoc "$f" -f gfm -o "build/${base}.docx" --reference-doc=default/skills/brand-styler/tools/templates/reference.docx
            pandoc "$f" -f gfm -o "build/${base}.pdf"  --template default/skills/brand-styler/tools/pandoc/pdf.latex --pdf-engine=xelatex --css default/skills/brand-styler/tools/brandify-md.css
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brand-docs
          path: build/
          retention-days: 14
